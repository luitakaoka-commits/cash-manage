<!DOCTYPE html><html lang="ja"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>MoneyFlow – キャッシュフロー管理</title>
<meta name="description" content="個人の資金を防衛・貯蓄・消費に完全に仕切る未来型キャッシュフロー管理PWA">
<link rel="manifest" href="./manifest.json"><meta name="theme-color" content="#38bdf8">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.2/dist/confetti.browser.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
<style>
:root{--bg0:#0b0f19;--bg1:#131c2e;--bg2:#1a2540;--glass:rgba(255,255,255,0.06);--gb:rgba(255,255,255,0.12);--blue:#38bdf8;--green:#4ade80;--red:#f87171;--purple:#a78bfa;--gold:#fbbf24;--text:#e2e8f0;--muted:#94a3b8}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;margin:0;font-family:-apple-system,BlinkMacSystemFont,'Helvetica Neue',Arial,sans-serif;background:var(--bg0);color:var(--text);overflow-x:hidden}
body{display:flex;flex-direction:column;min-height:100vh}
.gc{background:var(--glass);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border:1px solid var(--gb);border-radius:20px;padding:18px;margin-bottom:12px}
.ig{width:100%;background:rgba(255,255,255,0.05);border:1px solid var(--gb);border-radius:12px;color:var(--text);padding:11px 14px;font-size:15px;outline:none;transition:.2s}
.ig:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(56,189,248,0.15)}
select.ig option{background:#1a2540;color:var(--text)}
.lbl{display:block;font-size:13px;color:var(--muted);margin-bottom:6px;font-weight:500}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;border:none;border-radius:12px;padding:11px 18px;font-size:15px;font-weight:600;cursor:pointer;transition:.2s;white-space:nowrap}
.btn-p{background:linear-gradient(135deg,#0ea5e9,#6366f1);color:#fff;box-shadow:0 0 18px rgba(56,189,248,0.25)}
.btn-p:hover{box-shadow:0 0 30px rgba(56,189,248,0.5);transform:translateY(-1px)}
.btn-g{background:linear-gradient(135deg,#22c55e,#10b981);color:#fff;box-shadow:0 0 18px rgba(74,222,128,0.25)}
.btn-r{background:linear-gradient(135deg,#ef4444,#dc2626);color:#fff}
.btn-sm{padding:6px 12px;font-size:13px;border-radius:9px}
.btn-ghost{background:rgba(255,255,255,0.07);color:var(--text);border:1px solid var(--gb)}
.btn-ghost:hover{background:rgba(255,255,255,0.12)}
#header{position:fixed;top:0;left:0;right:0;z-index:100;background:rgba(11,15,25,0.9);backdrop-filter:blur(20px);border-bottom:1px solid var(--gb);padding:0 14px;display:flex;align-items:center;gap:8px;height:54px}
#header h1{font-size:17px;font-weight:900;background:linear-gradient(90deg,var(--blue),var(--purple));-webkit-background-clip:text;-webkit-text-fill-color:transparent;flex:1;margin:0}
.hclock{font-size:12px;color:var(--muted);font-variant-numeric:tabular-nums}
#nav{position:fixed;bottom:0;left:0;right:0;z-index:100;background:rgba(11,15,25,0.92);backdrop-filter:blur(20px);border-top:1px solid var(--gb);display:flex;height:60px}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;background:none;border:none;color:var(--muted);font-size:11px;cursor:pointer;transition:.2s}
.nav-btn.active{color:var(--blue)}.nav-btn i{font-size:20px}
.nav-btn.active i{filter:drop-shadow(0 0 6px var(--blue))}
#app-shell{display:none;flex:1;padding-top:54px;padding-bottom:60px;overflow-y:auto}
.page{display:none;padding:14px}.page.active{display:block}
#login-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px;background:radial-gradient(ellipse at 50% 0%,rgba(56,189,248,0.12) 0%,transparent 65%)}
.gauge-track{height:12px;border-radius:99px;background:rgba(255,255,255,0.08);overflow:hidden;margin:8px 0}
.gauge-fill{height:100%;border-radius:99px;background:linear-gradient(90deg,var(--red) 0%,var(--gold) 50%,var(--green) 100%);transition:width .6s cubic-bezier(.4,0,.2,1);min-width:4px}
.badge{display:inline-block;padding:2px 9px;border-radius:99px;font-size:11px;font-weight:700}
.bb{background:rgba(56,189,248,0.18);color:var(--blue)}.bg{background:rgba(74,222,128,0.18);color:var(--green)}
.br{background:rgba(248,113,113,0.18);color:var(--red)}.bgd{background:rgba(251,191,36,0.18);color:var(--gold)}
.bp{background:rgba(167,139,250,0.18);color:var(--purple)}.bm{background:rgba(148,163,184,0.12);color:var(--muted)}
.modal-bg{display:none;position:fixed;inset:0;z-index:200;background:rgba(0,0,0,0.75);backdrop-filter:blur(4px);align-items:flex-end;justify-content:center}
.modal-bg.open{display:flex}
.mbox{background:var(--bg1);border:1px solid var(--gb);border-radius:22px 22px 0 0;width:100%;max-width:520px;max-height:90vh;overflow-y:auto;padding:20px;animation:slideUp .28s ease}
.mbox.center{border-radius:22px;max-height:85vh;margin:auto}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
#toast{position:fixed;bottom:76px;left:50%;transform:translateX(-50%) translateY(12px);z-index:300;background:rgba(20,30,50,0.97);border:1px solid var(--gb);border-radius:12px;padding:11px 20px;font-size:14px;opacity:0;transition:.28s;pointer-events:none;max-width:90vw;text-align:center}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
@keyframes pglow{0%,100%{box-shadow:0 0 14px rgba(251,191,36,0.4)}50%{box-shadow:0 0 32px rgba(251,191,36,0.8)}}
.btn-mission{background:linear-gradient(135deg,#f59e0b,#d97706);color:#fff;animation:pglow 2s ease-in-out infinite}
.sec{font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin:14px 0 8px}
.apos{color:var(--green)}.aneg{color:var(--red)}
.tab-bar{display:flex;gap:4px;margin-bottom:12px;background:rgba(255,255,255,0.04);border-radius:12px;padding:4px}
.tab{flex:1;text-align:center;padding:7px 4px;border-radius:9px;font-size:13px;font-weight:600;color:var(--muted);cursor:pointer;transition:.2s;border:none;background:none}
.tab.active{background:rgba(56,189,248,0.2);color:var(--blue)}
.tx-row{display:flex;align-items:flex-start;gap:8px;padding:10px 0;border-bottom:1px solid rgba(255,255,255,0.06)}
.tx-row:last-child{border-bottom:none}
.toggle{width:20px;height:20px;border-radius:6px;border:2px solid var(--gb);background:transparent;appearance:none;-webkit-appearance:none;cursor:pointer;flex-shrink:0}
.toggle:checked{background:var(--blue);border-color:var(--blue);background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 16 16' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M13 4L6 11 3 8' stroke='%23000' stroke-width='2.5' fill='none' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E")}
.chart-wrap{position:relative;height:190px}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--gb);border-radius:2px}
.divider{height:1px;background:var(--gb);margin:12px 0}
@media(min-width:600px){.page{max-width:580px;margin:0 auto}.mbox{border-radius:22px;margin:auto}.modal-bg{align-items:center}}
</style></head>
<body>
<!-- LOGIN -->
<div id="login-screen">
  <div class="gc" style="width:100%;max-width:400px;margin-bottom:0">
    <div style="text-align:center;margin-bottom:24px">
      <div style="font-size:50px;margin-bottom:6px">💸</div>
      <h2 style="font-size:26px;font-weight:900;background:linear-gradient(90deg,#38bdf8,#a78bfa);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin:0">MoneyFlow</h2>
      <p style="color:var(--muted);font-size:13px;margin-top:4px">未来型キャッシュフロー管理</p>
    </div>
    <div id="auth-err" style="display:none;background:rgba(248,113,113,0.13);border:1px solid var(--red);border-radius:10px;padding:10px 14px;font-size:13px;color:var(--red);margin-bottom:14px"></div>
    <div style="margin-bottom:12px"><label class="lbl">メールアドレス</label><input id="auth-email" type="email" class="ig" placeholder="you@example.com" autocomplete="email"></div>
    <div style="margin-bottom:16px"><label class="lbl">パスワード</label><input id="auth-pass" type="password" class="ig" placeholder="6文字以上" autocomplete="current-password"></div>
    <button class="btn btn-p" style="width:100%;margin-bottom:10px" onclick="doLogin()"><i class="fa fa-sign-in-alt"></i> ログイン</button>
    <button class="btn btn-ghost" style="width:100%" onclick="doRegister()"><i class="fa fa-user-plus"></i> 新規登録</button>
    <p style="text-align:center;color:var(--muted);font-size:11px;margin-top:12px">※ firebaseConfigをご自身の値に書き換えてください</p>
  </div>
</div>
<!-- APP SHELL -->
<div id="app-shell">
  <div id="header">
    <h1>💸 MoneyFlow</h1>
    <span class="hclock" id="hclock"></span>
    <button id="btn-mission" style="display:none" class="btn btn-mission btn-sm" onclick="openMission()"><i class="fa fa-rocket"></i> 作戦</button>
    <button class="btn btn-p btn-sm" onclick="openTxModal()"><i class="fa fa-plus"></i></button>
  </div>
  <div id="page-home" class="page active"></div>
  <div id="page-transactions" class="page"></div>
  <div id="page-banks" class="page"></div>
  <div id="page-records" class="page"></div>
  <div id="page-settings" class="page"></div>
  <div id="nav">
    <button class="nav-btn active" id="nb-home" onclick="showPage('home')"><i class="fa fa-home"></i><span>ホーム</span></button>
    <button class="nav-btn" id="nb-transactions" onclick="showPage('transactions')"><i class="fa fa-list-ul"></i><span>取引</span></button>
    <button class="nav-btn" id="nb-banks" onclick="showPage('banks')"><i class="fa fa-university"></i><span>口座</span></button>
    <button class="nav-btn" id="nb-records" onclick="showPage('records')"><i class="fa fa-chart-bar"></i><span>記録</span></button>
    <button class="nav-btn" id="nb-settings" onclick="showPage('settings')"><i class="fa fa-cog"></i><span>設定</span></button>
  </div>
</div>
<div id="toast"></div>
<!-- TX MODAL -->
<div id="tx-modal" class="modal-bg" onclick="if(event.target===this)closeTxModal()">
  <div class="mbox">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
      <h3 id="tx-modal-title" style="margin:0;font-size:17px;font-weight:800">取引を追加</h3>
      <button class="btn btn-ghost btn-sm" onclick="closeTxModal()"><i class="fa fa-times"></i></button>
    </div>
    <form id="tx-form" onsubmit="saveTx(event)">
      <input type="hidden" id="tx-id">
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px">
        <div><label class="lbl">日付</label><input type="date" id="tx-date" class="ig" required></div>
        <div><label class="lbl">金額（円）</label><input type="number" id="tx-amount" class="ig" min="1" placeholder="0" required></div>
      </div>
      <div style="margin-bottom:12px"><label class="lbl">種別</label>
        <select id="tx-type" class="ig" onchange="onTxTypeChange()">
          <option value="credit_card">クレジットカード</option>
          <option value="withdrawal">引き落とし・現金</option>
          <option value="income">収入</option>
          <option value="savings">貯金</option>
          <option value="transfer">振替</option>
          <option value="investment">投資</option>
        </select></div>
      <div style="margin-bottom:12px"><label class="lbl">口座</label><select id="tx-bank" class="ig"></select></div>
      <div id="tx-card-wrap" style="display:none;margin-bottom:12px"><label class="lbl">カード名</label><input type="text" id="tx-card" class="ig" placeholder="例: 楽天カード"></div>
      <div id="tx-bankto-wrap" style="display:none;margin-bottom:12px">
        <label class="lbl">振替先口座</label><select id="tx-bank-to" class="ig"></select>
        <div style="margin-top:8px"><label class="lbl">振替種類</label>
          <select id="tx-transfer-target" class="ig"><option value="self">自己振替（貯金等）</option><option value="external">外部振替（送金）</option></select></div>
      </div>
      <div style="margin-bottom:12px"><label class="lbl">メモ</label><input type="text" id="tx-memo" class="ig" placeholder="任意"></div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px">
        <div><label class="lbl">内、立替金額（円）</label><input type="number" id="tx-lending-amount" class="ig" min="0" placeholder="0"></div>
        <div><label class="lbl"></label><div style="height:100%;display:flex;align-items:flex-end;padding-bottom:2px"><label style="display:flex;align-items:center;gap:8px;font-size:14px;cursor:pointer"><input type="checkbox" id="tx-exclude" class="toggle"> 余力計算除外</label></div></div>
      </div>
      <div style="display:flex;gap:10px">
        <button type="button" class="btn btn-ghost" style="flex:1" onclick="closeTxModal()">キャンセル</button>
        <button type="submit" class="btn btn-p" style="flex:2">保存</button>
      </div>
    </form>
  </div>
</div>
<!-- BANK MODAL -->
<div id="bank-modal" class="modal-bg" onclick="if(event.target===this)closeBankModal()">
  <div class="mbox">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
      <h3 id="bank-modal-title" style="margin:0;font-size:17px;font-weight:800">口座を追加</h3>
      <button class="btn btn-ghost btn-sm" onclick="closeBankModal()"><i class="fa fa-times"></i></button>
    </div>
    <form id="bank-form" onsubmit="saveBank(event)">
      <input type="hidden" id="bank-id">
      <div style="margin-bottom:12px"><label class="lbl">口座名</label><input type="text" id="bank-name" class="ig" placeholder="例: 三菱UFJ銀行" required>
        <p style="font-size:11px;color:var(--muted);margin-top:5px">「三菱UFJ/MUFG」→防衛 ／「三井住友/SMBC」→娯楽NISA ／「住信SBI/SBI」→貯金</p></div>
      <div style="margin-bottom:16px"><label class="lbl">現在の残高（円）</label><input type="number" id="bank-balance" class="ig" placeholder="0" required></div>
      <div style="display:flex;gap:10px">
        <button type="button" class="btn btn-ghost" style="flex:1" onclick="closeBankModal()">キャンセル</button>
        <button type="submit" class="btn btn-p" style="flex:2">保存</button>
      </div>
    </form>
  </div>
</div>
<!-- MISSION MODAL -->
<div id="mission-modal" class="modal-bg" onclick="if(event.target===this)closeMission()">
  <div class="mbox center" style="max-width:480px"><div id="mission-content"></div></div>
</div>
<!-- PRESET MODAL -->
<div id="preset-modal" class="modal-bg" onclick="if(event.target===this)closePresetModal()">
  <div class="mbox">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
      <h3 style="margin:0;font-size:17px;font-weight:800">固定費プリセット追加</h3>
      <button class="btn btn-ghost btn-sm" onclick="closePresetModal()"><i class="fa fa-times"></i></button>
    </div>
    <form id="preset-form" onsubmit="savePreset(event)">
      <div style="margin-bottom:12px"><label class="lbl">名称</label><input type="text" id="preset-name" class="ig" placeholder="例: Netflix" required></div>
      <div style="margin-bottom:12px"><label class="lbl">金額（円）</label><input type="number" id="preset-amount" class="ig" min="1" required></div>
      <div style="margin-bottom:12px"><label class="lbl">種別</label>
        <select id="preset-type" class="ig"><option value="credit_card">クレジットカード</option><option value="withdrawal">引き落とし</option></select></div>
      <div style="margin-bottom:16px"><label class="lbl">口座</label><select id="preset-bank" class="ig"></select></div>
      <div style="display:flex;gap:10px">
        <button type="button" class="btn btn-ghost" style="flex:1" onclick="closePresetModal()">キャンセル</button>
        <button type="submit" class="btn btn-p" style="flex:2">保存</button>
      </div>
    </form>
  </div>
</div>
<script>
// ========== FIREBASE CONFIG (要書き換え) ==========
const firebaseConfig = {
  apiKey: "AIzaSyA4qpbwxpp8tEEWLCkNMPIYuDTN7G9cF3A",
  authDomain: "cash-manege.firebaseapp.com",
  projectId: "cash-manege",
  storageBucket: "cash-manege.firebasestorage.app",
  messagingSenderId: "529145553530",
  appId: "1:529145553530:web:d65452017ffb9c109b51c3"
};
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();
db.enablePersistence().catch(()=>{});

// ========== STATE ==========
const S = {
  uid:null, banks:[], txs:[], presets:[],
  settings:{defenseLine:150000,savingsGoal:0,nisaGoal:0,savingsBalance:0,nisaBalance:0,income9:0,income15:0,lastMissionMonth:'',nextIncome9:0,nextIncome15:0},
  holidays:{}, unsubs:[]
};
let currentPage='home', txTab='pending', chartInstance=null, showFormula=false;

// ========== UTILITIES ==========
const esc=s=>String(s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const fmt=n=>'¥'+Math.abs(Math.round(n)).toLocaleString('ja-JP');
const fmtS=n=>(n>=0?'+':'')+Math.round(n).toLocaleString('ja-JP')+'円';

function jstNow(){ return new Date(new Date().toLocaleString('en-US',{timeZone:'Asia/Tokyo'})); }
function jstToday(){
  const d=jstNow();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function jstYM(){ const d=jstNow(); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`; }
function g(id){ return document.getElementById(id); }
function v(id){ return (g(id)||{}).value||''; }
function set(id,val){ const el=g(id); if(el) el.value=(val??''); }

function getBankRole(name){
  const n=(name||'').toUpperCase();
  if(n.includes('三菱UFJ')||n.includes('MUFG')) return 'defense';
  if(n.includes('三井住友')||n.includes('SMBC')) return 'entertainment';
  if(n.includes('住信SBI')||n.includes('SBI')) return 'savings';
  return 'other';
}
function roleLabel(r){ return {defense:'🛡 生活防衛',entertainment:'🎮 娯楽・NISA',savings:'🏦 貯金',other:'💼 その他'}[r]||''; }
function roleBadge(r){ return {defense:'bb',entertainment:'bp',savings:'bg',other:'bm'}[r]||'bm'; }
function txTypeLabel(t){ return {credit_card:'クレカ',withdrawal:'引落',income:'収入',savings:'貯金',transfer:'振替',investment:'投資'}[t]||t; }
function txTypeBadge(t){ return {credit_card:'br',withdrawal:'bgd',income:'bg',savings:'bp',transfer:'bb',investment:'bm'}[t]||'bm'; }

async function fetchHolidays(year){
  if(S.holidays[year]) return;
  try{ const r=await fetch(`https://api.excelapi.org/datetime/holiday?year=${year}`); S.holidays[year]=await r.json(); }
  catch(e){ S.holidays[year]=[]; }
}
function isHoliday(ds){
  const d=new Date(ds+'T00:00:00+09:00'), wd=d.getDay();
  if(wd===0||wd===6) return true;
  return (S.holidays[d.getFullYear()]||[]).includes(ds);
}
function prevWorkday(ds){
  let d=new Date(ds+'T00:00:00+09:00');
  d.setDate(d.getDate()-1);
  while(true){
    const s=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    if(!isHoliday(s)) return s;
    d.setDate(d.getDate()-1);
  }
}
function adjustedDate(y,m,day){
  const s=`${y}-${String(m).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
  return isHoliday(s)?prevWorkday(s):s;
}

// ========== AUTH ==========
window.doLogin=async()=>{
  clearAuthErr();
  try{ await auth.signInWithEmailAndPassword(v('auth-email'),v('auth-pass')); }
  catch(err){ showAuthErr(authMsg(err.code)); }
};
window.doRegister=async()=>{
  clearAuthErr();
  if(v('auth-pass').length<6){showAuthErr('パスワードは6文字以上');return;}
  try{ await auth.createUserWithEmailAndPassword(v('auth-email'),v('auth-pass')); }
  catch(err){ showAuthErr(authMsg(err.code)); }
};
window.doLogout=()=>{ if(confirm('ログアウトしますか？')) auth.signOut(); };
function authMsg(c){ const m={'auth/invalid-email':'メール形式エラー','auth/user-not-found':'ユーザー不明','auth/wrong-password':'パスワード誤り','auth/email-already-in-use':'メール使用済み','auth/weak-password':'パスワード弱すぎ','auth/invalid-credential':'認証情報が正しくありません','auth/too-many-requests':'しばらく待ってください'}; return m[c]||`エラー(${c})`; }

function loadAll(){

  S.unsubs.push(base.collection('banks').onSnapshot(sn=>{ S.banks=sn.docs.map(d=>({id:d.id,...d.data()})); redraw(); }));
  S.unsubs.push(base.collection('transactions').orderBy('date','desc').onSnapshot(sn=>{ S.txs=sn.docs.map(d=>({id:d.id,...d.data()})); redraw(); }));
  S.unsubs.push(base.collection('presetFixedCosts').onSnapshot(sn=>{ S.presets=sn.docs.map(d=>({id:d.id,...d.data()})); redraw(); }));

}

// ========== CALC HELPERS ==========
function getDefenseBank(){ return S.banks.find(b=>getBankRole(b.name)==='defense')||null; }
function getEntBank(){ return S.banks.find(b=>getBankRole(b.name)==='entertainment')||null; }
function getSavingsBank(){ return S.banks.find(b=>getBankRole(b.name)==='savings')||null; }

function pendingExp(bankId){
  const today=jstToday(), next14=getNextDeadline();
  // 当座分（次の14日まで）の未決済のみを対象にする
  return S.txs.filter(t=>t.status==='pending'&&t.bankId===bankId&&t.date>=today&&t.date<=next14&&t.type!=='income'&&t.type!=='savings'&&!t.excludeFromCalc).reduce((s,t)=>s+Number(t.amount||0),0);
}
function calcFree(){
  const db_=getDefenseBank(); if(!db_) return null;
  return Number(db_.currentBalance||0)-pendingExp(db_.id)-Number(S.settings.defenseLine||150000);
}

// ========== 共通集計関数：ロジックの一元化 ==========
// 渡された取引配列からサマリーを計算する純粋関数
// income / transfer / savings は計算外。立替は lendingAmount（内訳）で集計。
// 戻り値: { burdenTotal, lendingTotal, realBurden }
function calcSummary(txArray){
  const targets=txArray.filter(t=>t.type!=='income'&&t.type!=='transfer'&&t.type!=='savings');
  const burdenTotal=targets.reduce((s,t)=>s+Number(t.amount||0),0);
  // lendingAmountは内訳金額。未定義の旧データは 0 として扱う
  const lendingTotal=targets.reduce((s,t)=>s+Number(t.lendingAmount||0),0);
  return{burdenTotal,lendingTotal,realBurden:burdenTotal-lendingTotal};
}

// 次の14日（当座期限）を自動判定する関数
// 今日が15日以降なら翔月の14日、それ以外なら当月の14日
function getNextDeadline(){
  const d=jstNow(),yr=d.getFullYear(),mo=d.getMonth()+1,day=d.getDate();
  if(day<15) return `${yr}-${String(mo).padStart(2,'0')}-14`;
  const nyr=mo===12?yr+1:yr,nmo=mo===12?1:mo+1;
  return `${nyr}-${String(nmo).padStart(2,'0')}-14`;
}

// 3段階色分けヘルパー
// 赤: bal<pend  オレンジ: pend<=bal<pend+def  緑: bal>=pend+def
function balanceStatus(bal, pend, def=0){
  if(bal<pend) return {color:'var(--red)',warnText:'❌ お金が足りません！'};
  if(def>0 && bal<pend+def) return {color:'var(--gold)',warnText:'⚠️ 防衛ラインが確保できません'};
  return {color:'var(--green)',warnText:''};
}
function nextCreditDate(){
  const today=jstToday(), dates=S.txs.filter(t=>t.type==='credit_card'&&t.status==='pending'&&t.date>=today).map(t=>t.date).sort();
  return dates[0]||null;
}
function incomeSchedule(){
  const d=jstNow(), yr=d.getFullYear(), mo=d.getMonth()+1, nyr=mo===12?yr+1:yr, nmo=mo===12?1:mo+1;
  return { d9:adjustedDate(yr,mo,9), d15:adjustedDate(yr,mo,15), d9n:adjustedDate(nyr,nmo,9), d15n:adjustedDate(nyr,nmo,15), inc9:S.settings.income9||0, inc15:S.settings.income15||0, ninc9:S.settings.nextIncome9||0, ninc15:S.settings.nextIncome15||0 };
}

window.showToast=msg=>{ const el=g('toast'); el.textContent=msg; el.classList.add('show'); clearTimeout(_tt); _tt=setTimeout(()=>el.classList.remove('show'),3000); };

}

function renderTransactions(){
  const tabLabels={pending:'未完了',completed:'完了済',collected:'回収済'};
  let html=`<div class="tab-bar">${['pending','completed','collected'].map(t=>`<button class="tab ${txTab===t?'active':''}" onclick="window.setTxTab('${t}')">${tabLabels[t]}</button>`).join('')}</div>`;
  const filtered=S.txs.filter(t=>t.status===txTab),today=jstToday();
  if(!filtered.length){html+=`<div style="text-align:center;padding:40px;color:var(--muted)"><i class="fa fa-inbox" style="font-size:36px;display:block;margin-bottom:10px"></i>取引がありません</div>`;}
  else{
    html+='<div class="gc" style="padding:10px 14px">';
    filtered.forEach(t=>{
      const b=S.banks.find(b=>b.id===t.bankId),isInc=t.type==='income'||t.type==='savings',isPast=t.date<today,la=Number(t.lendingAmount||0);
      html+=`<div class="tx-row"><div style="flex:1;min-width:0"><div style="display:flex;flex-wrap:wrap;gap:4px;align-items:center;margin-bottom:3px"><span class="badge ${txTypeBadge(t.type)}">${txTypeLabel(t.type)}</span>${la>0?`<span class="badge bp">内立替: ${fmt(la)}</span>`:''}${t.excludeFromCalc?'<span class="badge bm">除外</span>':''}${t.cardName?`<span class="badge bm">${esc(t.cardName)}</span>`:''}</div><div style="font-size:13px;margin-bottom:2px">${esc(t.memo||'（メモなし）')}</div><div style="font-size:11px;color:var(--muted)">${t.date}${b?' / '+esc(b.name):''}</div></div><div style="display:flex;flex-direction:column;align-items:flex-end;gap:5px;flex-shrink:0"><div class="${isInc?'apos':'aneg'}" style="font-weight:700;font-size:16px">${isInc?'+':'−'}${fmt(t.amount)}</div><div style="display:flex;gap:4px">${txTab==='pending'&&isPast?`<button class="btn btn-g btn-sm" onclick="completeTx('${t.id}')">完了</button>`:''}<button class="btn btn-ghost btn-sm" onclick="editTxModal('${t.id}')"><i class="fa fa-edit"></i></button><button class="btn btn-r btn-sm" onclick="deleteTx('${t.id}')"><i class="fa fa-trash"></i></button></div></div></div>`;
    });
    html+='</div>';
  }
  g('page-transactions').innerHTML=html;
}
window.setTxTab=tab=>{txTab=tab;renderTransactions();};

// ========== BANKS PAGE ==========
function renderBanks(){
  let html=`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px"><h2 style="margin:0;font-size:18px;font-weight:800">口座管理</h2><button class="btn btn-p btn-sm" onclick="openBankModal()"><i class="fa fa-plus"></i> 追加</button></div>`;
  if(!S.banks.length){html+=`<div class="gc" style="text-align:center;color:var(--muted)"><i class="fa fa-university" style="font-size:36px;display:block;margin-bottom:10px"></i>口座を追加してください</div>`;}
  else{
    S.banks.forEach(b=>{
      const role=getBankRole(b.name),pend=pendingExp(b.id),bal=Number(b.currentBalance||0);
      const pct=Math.min(100,Math.max(0,bal>0?Math.round(pend/bal*100):0));
      // 防衛帯口座は dlを使用、それ以外は def=0
      const defVal=role==='defense'?Number(S.settings.defenseLine||150000):0;
      const{color:bColor,warnText:bWarn}=balanceStatus(bal,pend,defVal);
      const surplus=bal-pend;
     html+=`<div class="gc"><div style="display:flex;justify-content:space-between;align-items:flex-start"><div><span class="badge ${roleBadge(role)}">${roleLabel(role)}</span><div style="font-size:16px;font-weight:800;margin-top:6px">${esc(b.name)}</div><div style="font-size:22px;font-weight:900;margin-top:4px;color:${bColor}">${fmt(bal)}</div></div><div style="display:flex;gap:6px"><button class="btn btn-ghost btn-sm" onclick="editBankModal('${b.id}')"><i class="fa fa-edit"></i></button><button class="btn btn-r btn-sm" onclick="deleteBank('${b.id}')"><i class="fa fa-trash"></i></button></div></div>${role!=='savings'?`<div style="margin-top:10px"><div style="display:flex;justify-content:space-between;font-size:12px;color:var(--muted);margin-bottom:4px"><span>当座未決済 ${fmt(pend)}</span><span style="color:${bColor};font-weight:700">余力 ${fmt(surplus)}</span></div><div class="gauge-track"><div class="gauge-fill" style="width:${pct}%;background:linear-gradient(90deg,var(--green),var(--gold),var(--red))"></div></div>${bWarn?`<div style="margin-top:6px;font-size:12px;color:var(--red)">${bWarn}</div>`:''}</div>`:'<div style="margin-top:8px;font-size:12px;color:var(--muted)">🔒 開かずの金庫 – 残高参照のみ</div>'}</div>`;
  }
  g('page-banks').innerHTML=html;
}
</script>
<script>
// ========== RECORDS PAGE ==========
function renderRecords(){
  const months=[],now=jstNow();
  for(let i=5;i>=0;i--){const d=new Date(now.getFullYear(),now.getMonth()-i,1);months.push(`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`);}
  // ④ calcSummaryを利用し月ごとに集計（ステータス不問・全取引対象）
  const data=months.map(ym=>{
    const monthTxs=S.txs.filter(t=>t.date&&t.date.startsWith(ym));
    const{burdenTotal,lendingTotal,realBurden}=calcSummary(monthTxs);
    const savings=monthTxs.filter(t=>t.type==='savings').reduce((s,t)=>s+Number(t.amount||0),0);
    return{ym,burden:burdenTotal,real:realBurden,savings,lending:lendingTotal};
  });
  // ⑤ 貯金口座の現在残高カード
  const savBank=getSavingsBank();
  const savBal=savBank?Number(savBank.currentBalance||0):null;
  let html=`<h2 style="margin:0 0 14px;font-size:18px;font-weight:800">月別記録</h2>`;
  if(savBank){
    html+=`<div class="gc" style="border:1px solid rgba(74,222,128,0.3)"><div style="display:flex;justify-content:space-between;align-items:center"><span class="badge bg">🏦 貯金残高</span><span style="font-size:11px;color:var(--muted)">${esc(savBank.name)}</span></div><div style="font-size:28px;font-weight:900;color:var(--green);margin:8px 0">${fmt(savBal)}</div></div>`;
  }
  html+=`<div class="gc"><div class="sec" style="margin-top:0">直近6ヶ月の支出推移（未決済含む）</div><div class="chart-wrap"><canvas id="records-chart"></canvas></div></div><div class="gc"><table style="width:100%;font-size:13px;border-collapse:collapse"><thead><tr style="color:var(--muted);font-size:11px"><th style="text-align:left;padding:6px 4px">月</th><th style="text-align:right;padding:6px 4px">負担</th><th style="text-align:right;padding:6px 4px">実質</th><th style="text-align:right;padding:6px 4px">立替</th><th style="text-align:right;padding:6px 4px">貯金</th></tr></thead><tbody>`;
  data.slice().reverse().forEach(d=>{html+=`<tr style="border-top:1px solid rgba(255,255,255,0.06)"><td style="padding:8px 4px;font-weight:600">${d.ym}</td><td style="text-align:right;padding:8px 4px;color:var(--red)">${fmt(d.burden)}</td><td style="text-align:right;padding:8px 4px;color:var(--gold)">${fmt(d.real)}</td><td style="text-align:right;padding:8px 4px;color:var(--purple)">${fmt(d.lending)}</td><td style="text-align:right;padding:8px 4px;color:var(--green)">${fmt(d.savings)}</td></tr>`;});
  html+=`</tbody></table></div>`;
  g('page-records').innerHTML=html;
  setTimeout(()=>{const canvas=g('records-chart');if(!canvas)return;if(chartInstance){chartInstance.destroy();chartInstance=null;}const labels=data.map(d=>d.ym.slice(5)+'月');chartInstance=new Chart(canvas,{type:'bar',data:{labels,datasets:[{label:'負担',data:data.map(d=>d.burden),backgroundColor:'rgba(248,113,113,0.6)',borderRadius:6},{label:'実質負担',data:data.map(d=>d.real),backgroundColor:'rgba(45,212,191,0.6)',borderRadius:6},{label:'貯金',data:data.map(d=>d.savings),backgroundColor:'rgba(74,222,128,0.5)',borderRadius:6}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{color:'#94a3b8',font:{size:11}}}},scales:{x:{ticks:{color:'#94a3b8'},grid:{color:'rgba(255,255,255,0.04)'}},y:{ticks:{color:'#94a3b8',callback:v=>'¥'+v.toLocaleString()},grid:{color:'rgba(255,255,255,0.06)'}}}}});},50);
}
// ========== SETTINGS PAGE ==========
function renderSettings(){
  const s=S.settings;
  let presHtml='';
  S.presets.forEach(p=>{const b=S.banks.find(b=>b.id===p.bankId);presHtml+=`<div class="tx-row"><div style="flex:1"><div style="font-weight:600">${esc(p.name)}</div><div style="font-size:12px;color:var(--muted)">${txTypeLabel(p.type)}${b?' / '+esc(b.name):''}</div></div><div style="display:flex;gap:6px;align-items:center"><span style="font-weight:700">${fmt(p.amount)}</span><button class="btn btn-r btn-sm" onclick="deletePreset('${p.id}')"><i class="fa fa-trash"></i></button></div></div>`;});
  g('page-settings').innerHTML=`<h2 style="margin:0 0 14px;font-size:18px;font-weight:800">設定</h2><div class="gc"><div class="sec" style="margin-top:0">防衛ライン設定</div><label class="lbl">生活防衛ライン（円）</label><input type="number" id="set-defense" class="ig" value="${s.defenseLine||150000}"><button class="btn btn-p btn-sm" style="margin-top:10px" onclick="saveSetting('defenseLine','set-defense')">保存</button></div><div class="gc"><div class="sec" style="margin-top:0">NISA・貯金 目標</div><div style="display:grid;grid-template-columns:1fr 1fr;gap:10px"><div><label class="lbl">NISA月額（円）</label><input type="number" id="set-nisa-goal" class="ig" value="${s.nisaGoal||0}"></div><div><label class="lbl">貯金目標（円）</label><input type="number" id="set-savings-goal" class="ig" value="${s.savingsGoal||0}"></div></div><button class="btn btn-p btn-sm" style="margin-top:10px" onclick="saveGoals()">保存</button></div><div class="gc"><div class="sec" style="margin-top:0">今月の収入</div><div style="display:grid;grid-template-columns:1fr 1fr;gap:10px"><div><label class="lbl">9日分（円）</label><input type="number" id="set-inc9" class="ig" value="${s.income9||0}"></div><div><label class="lbl">15日分（円）</label><input type="number" id="set-inc15" class="ig" value="${s.income15||0}"></div></div><button class="btn btn-p btn-sm" style="margin-top:10px" onclick="saveIncomes()">保存</button></div><div class="gc"><div class="sec" style="margin-top:0">翌月収入（先行入力）</div><div style="display:grid;grid-template-columns:1fr 1fr;gap:10px"><div><label class="lbl">翌月9日分（円）</label><input type="number" id="set-ninc9" class="ig" value="${s.nextIncome9||0}"></div><div><label class="lbl">翌月15日分（円）</label><input type="number" id="set-ninc15" class="ig" value="${s.nextIncome15||0}"></div></div><button class="btn btn-p btn-sm" style="margin-top:10px" onclick="saveNextIncomes()">保存</button></div><div class="gc"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px"><div class="sec" style="margin:0">固定費プリセット</div><div style="display:flex;gap:8px"><button class="btn btn-g btn-sm" onclick="bulkAddPresets()"><i class="fa fa-bolt"></i> 一括追加</button><button class="btn btn-p btn-sm" onclick="openPresetModal()"><i class="fa fa-plus"></i></button></div></div>${presHtml||'<div style="color:var(--muted);font-size:13px">プリセットがありません</div>'}</div><div class="gc"><div class="sec" style="margin-top:0">データ管理</div><div style="display:flex;flex-direction:column;gap:10px"><button class="btn btn-ghost" onclick="exportData()"><i class="fa fa-download"></i> JSONエクスポート</button><button class="btn btn-r" onclick="resetAllData()"><i class="fa fa-trash-alt"></i> 全データリセット</button><button class="btn btn-ghost" onclick="doLogout()"><i class="fa fa-sign-out-alt"></i> ログアウト</button></div></div>`;
}
window.saveSetting=async(key,inputId)=>{const val=Number(g(inputId)?.value||0);await db.collection('users').doc(S.uid).collection('settings').doc('main').set({[key]:val},{merge:true});showToast('設定を保存しました');};
window.saveGoals=async()=>{await db.collection('users').doc(S.uid).collection('settings').doc('main').set({nisaGoal:Number(v('set-nisa-goal')||0),savingsGoal:Number(v('set-savings-goal')||0)},{merge:true});showToast('目標を保存しました');};
window.saveIncomes=async()=>{await db.collection('users').doc(S.uid).collection('settings').doc('main').set({income9:Number(v('set-inc9')||0),income15:Number(v('set-inc15')||0)},{merge:true});showToast('収入設定を保存しました');};
window.saveNextIncomes=async()=>{await db.collection('users').doc(S.uid).collection('settings').doc('main').set({nextIncome9:Number(v('set-ninc9')||0),nextIncome15:Number(v('set-ninc15')||0)},{merge:true});showToast('翌月収入を保存しました');};
// ========== TX MODAL ==========
window.openTxModal=()=>{g('tx-modal-title').textContent='取引を追加';g('tx-id').value='';g('tx-date').value=jstToday();g('tx-amount').value='';g('tx-lending-amount').value='';g('tx-type').value='credit_card';g('tx-memo').value='';g('tx-exclude').checked=false;g('tx-card').value='';populateBankSel('tx-bank');populateBankSel('tx-bank-to');onTxTypeChange();g('tx-modal').classList.add('open');};
window.closeTxModal=()=>g('tx-modal').classList.remove('open');
window.editTxModal=id=>{const t=S.txs.find(t=>t.id===id);if(!t)return;g('tx-modal-title').textContent='取引を編集';g('tx-id').value=t.id;g('tx-date').value=t.date||'';g('tx-amount').value=t.amount||'';g('tx-lending-amount').value=t.lendingAmount||'';g('tx-type').value=t.type||'credit_card';g('tx-memo').value=t.memo||'';g('tx-exclude').checked=!!t.excludeFromCalc;g('tx-card').value=t.cardName||'';populateBankSel('tx-bank');populateBankSel('tx-bank-to');g('tx-bank').value=t.bankId||'';g('tx-bank-to').value=t.bankIdTo||'';g('tx-transfer-target').value=t.transferTarget||'self';onTxTypeChange();g('tx-modal').classList.add('open');};
window.onTxTypeChange=()=>{const tp=v('tx-type');g('tx-card-wrap').style.display=tp==='credit_card'?'':'none';g('tx-bankto-wrap').style.display=tp==='transfer'?'':'none';};
window.saveTx=async e=>{e.preventDefault();const id=v('tx-id'),base=db.collection('users').doc(S.uid).collection('transactions');const lendingAmount=Math.min(Number(v('tx-lending-amount')||0),Number(v('tx-amount')||0));const data={date:v('tx-date'),amount:Number(v('tx-amount')),lendingAmount,type:v('tx-type'),bankId:v('tx-bank'),memo:v('tx-memo'),status:'pending',excludeFromCalc:g('tx-exclude').checked,cardName:v('tx-card')||'',bankIdTo:v('tx-bank-to')||'',transferTarget:v('tx-transfer-target')||'self',createdAt:new Date().toISOString()};if(id)await base.doc(id).update(data);else await base.add(data);closeTxModal();showToast(id?'取引を更新しました':'取引を追加しました');};
// ========== TX ACTIONS ==========
window.completeTx=async id=>{const t=S.txs.find(t=>t.id===id);if(!t)return;const isInc=t.type==='income',isSav=t.type==='savings';const base=db.collection('users').doc(S.uid);const batch=db.batch();batch.update(base.collection('transactions').doc(id),{status:'completed'});if(t.bankId){const bank=S.banks.find(b=>b.id===t.bankId);if(bank){const delta=isInc||isSav?Number(t.amount||0):-Number(t.amount||0);batch.update(base.collection('banks').doc(t.bankId),{currentBalance:firebase.firestore.FieldValue.increment(delta)});}if(isSav&&t.bankIdTo)batch.update(base.collection('banks').doc(t.bankIdTo),{currentBalance:firebase.firestore.FieldValue.increment(Number(t.amount||0))});}if(isSav)batch.set(base.collection('settings').doc('main'),{savingsBalance:firebase.firestore.FieldValue.increment(Number(t.amount||0))},{merge:true});await batch.commit();showToast('✅ 完了！残高を更新しました');};
window.collectTx=async id=>{await db.collection('users').doc(S.uid).collection('transactions').doc(id).update({status:'collected'});showToast('🤝 回収済みにしました');};
window.deleteTx=async id=>{if(!confirm('この取引を削除しますか？'))return;await db.collection('users').doc(S.uid).collection('transactions').doc(id).delete();showToast('削除しました');};
// ========== BANK CRUD ==========
window.openBankModal=()=>{g('bank-modal-title').textContent='口座を追加';g('bank-id').value='';g('bank-name').value='';g('bank-balance').value='';g('bank-modal').classList.add('open');};
window.editBankModal=id=>{const b=S.banks.find(b=>b.id===id);if(!b)return;g('bank-modal-title').textContent='口座を編集';g('bank-id').value=b.id;g('bank-name').value=b.name;g('bank-balance').value=b.currentBalance||0;g('bank-modal').classList.add('open');};
window.closeBankModal=()=>g('bank-modal').classList.remove('open');
window.saveBank=async e=>{e.preventDefault();const id=v('bank-id'),base=db.collection('users').doc(S.uid).collection('banks');const data={name:v('bank-name'),currentBalance:Number(v('bank-balance'))};if(id)await base.doc(id).update(data);else await base.add(data);closeBankModal();showToast(id?'口座を更新しました':'口座を追加しました');};
window.deleteBank=async id=>{if(!confirm('この口座を削除しますか？（取引データは残ります）'))return;await db.collection('users').doc(S.uid).collection('banks').doc(id).delete();showToast('口座を削除しました');};
// ========== PRESET CRUD ==========
window.openPresetModal=()=>{g('preset-name').value='';g('preset-amount').value='';g('preset-type').value='credit_card';populateBankSel('preset-bank');g('preset-modal').classList.add('open');};
window.closePresetModal=()=>g('preset-modal').classList.remove('open');
window.savePreset=async e=>{e.preventDefault();await db.collection('users').doc(S.uid).collection('presetFixedCosts').add({name:v('preset-name'),amount:Number(v('preset-amount')),type:v('preset-type'),bankId:v('preset-bank')});closePresetModal();showToast('プリセットを追加しました');};
window.deletePreset=async id=>{if(!confirm('このプリセットを削除しますか？'))return;await db.collection('users').doc(S.uid).collection('presetFixedCosts').doc(id).delete();showToast('削除しました');};
window.bulkAddPresets=async()=>{if(!S.presets.length){showToast('プリセットがありません');return;}if(!confirm(`${S.presets.length}件を今日付けで追加します。よろしいですか？`))return;const today=jstToday(),base=db.collection('users').doc(S.uid).collection('transactions'),batch=db.batch();S.presets.forEach(p=>{batch.set(base.doc(),{date:today,type:p.type,amount:p.amount,bankId:p.bankId,memo:p.name,status:'pending',isLending:false,excludeFromCalc:false,cardName:'',bankIdTo:'',transferTarget:'self',createdAt:new Date().toISOString()});});await batch.commit();showToast(`✅ ${S.presets.length}件を追加しました`);};
// ========== EXPORT / RESET ==========
window.exportData=async()=>{const base=db.collection('users').doc(S.uid);const[banks,txs,presets,settings]=await Promise.all([base.collection('banks').get(),base.collection('transactions').get(),base.collection('presetFixedCosts').get(),base.collection('settings').doc('main').get()]);const data={banks:banks.docs.map(d=>({id:d.id,...d.data()})),transactions:txs.docs.map(d=>({id:d.id,...d.data()})),presets:presets.docs.map(d=>({id:d.id,...d.data()})),settings:settings.exists?settings.data():{}};const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=`moneyflow_${jstToday()}.json`;a.click();};
window.resetAllData=async()=>{if(!confirm('全データを削除します。この操作は取り消せません。'))return;if(!confirm('本当に削除しますか？'))return;const base=db.collection('users').doc(S.uid);const[b,t,p]=await Promise.all([base.collection('banks').get(),base.collection('transactions').get(),base.collection('presetFixedCosts').get()]);const batch=db.batch();[...b.docs,...t.docs,...p.docs].forEach(d=>batch.delete(d.ref));batch.delete(base.collection('settings').doc('main'));await batch.commit();showToast('全データを削除しました');};
</script>
<script>
// ========== 15日作戦ウィザード ==========
let missionStep=1, missionInc9=0, missionInc15=0;

window.openMission=()=>{
  missionStep=1; missionInc9=0; missionInc15=0;
  renderMissionStep();
  g('mission-modal').classList.add('open');
};
window.closeMission=()=>g('mission-modal').classList.remove('open');

function renderMissionStep(){
  const steps=[null,'収入入力','送金指示の確認','作戦完了'];
  const stepDots=steps.slice(1).map((s,i)=>{
    const n=i+1;
    const cls=n<missionStep?'done':n===missionStep?'active':'wait';
    return `<div style="display:flex;flex-direction:column;align-items:center;gap:4px"><div style="width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;background:${cls==='done'?'var(--green)':cls==='active'?'var(--blue)':'rgba(255,255,255,0.08)'};color:${cls==='wait'?'var(--muted)':'#000'}">${cls==='done'?'✓':n}</div><div style="font-size:10px;color:var(--muted)">${s}</div></div>`;
  }).join('<div style="flex:1;height:2px;background:var(--gb);margin-top:14px"></div>');
  let body='';
  if(missionStep===1){
    body=`<div style="margin-bottom:16px"><label class="lbl">9日の仕送り額（円）</label><input type="number" id="miss-inc9" class="ig" value="${missionInc9||0}" placeholder="0"></div><div style="margin-bottom:20px"><label class="lbl">15日のバイト代（円）</label><input type="number" id="miss-inc15" class="ig" value="${missionInc15||0}" placeholder="0"></div><button class="btn btn-p" style="width:100%" onclick="missionNext1()">次へ <i class="fa fa-arrow-right"></i></button>`;
  } else if(missionStep===2){
    const total=missionInc9+missionInc15;
    const free=calcFree()||0;
    const nisa=Number(S.settings.nisaGoal||0);
    const avail=free+total;
    let mode,modeLabel,modeColor,entertainment,transfer;
    if(total>=50000){mode='A';modeLabel='Aモード（標準）';modeColor='var(--green)';entertainment=Math.max(0,avail-nisa);transfer=nisa+entertainment;}
    else if(total>=30001){mode='B';modeLabel='Bモード（圧縮）';modeColor='var(--gold)';entertainment=Math.max(0,avail-nisa);transfer=nisa+entertainment;}
    else{mode='C';modeLabel='Cモード（防御）';modeColor='var(--red)';entertainment=0;transfer=Math.min(avail,nisa);}
    const entBank=getEntBank();
    const warnings=[];
    if(mode==='B') warnings.push('⚠️ 来月の貯金が減額になる可能性があります');
    if(mode==='C'){warnings.push('🚨 娯楽費は0円です。貯金設定の停止を検討してください');if(avail<nisa)warnings.push('🚨 NISA月額も確保困難です。翌月NISA減額を強く推奨します');}
    body=`
      <div style="background:rgba(255,255,255,0.05);border-radius:12px;padding:14px;margin-bottom:14px">
        <div style="font-size:13px;color:var(--muted);margin-bottom:6px">収入合計</div>
        <div style="font-size:22px;font-weight:900;color:var(--green)">${fmt(total)}</div>
        <div style="font-size:12px;color:var(--muted);margin-top:4px">仕送り${fmt(missionInc9)} + バイト${fmt(missionInc15)}</div>
      </div>
      <div style="display:inline-block;padding:4px 14px;border-radius:99px;font-weight:700;font-size:13px;background:rgba(0,0,0,0.3);border:1px solid ${modeColor};color:${modeColor};margin-bottom:14px">${modeLabel}</div>
      <div style="background:rgba(56,189,248,0.1);border:1px solid rgba(56,189,248,0.3);border-radius:12px;padding:14px;margin-bottom:14px">
        <div style="font-size:13px;color:var(--muted);margin-bottom:4px">💳 ことら送金指示</div>
        <div style="font-size:24px;font-weight:900;color:var(--blue)">${fmt(transfer)}</div>
        <div style="font-size:12px;color:var(--muted);margin-top:4px">${entBank?`口座③ ${esc(entBank.name)} へ`:'娯楽・NISA口座へ'}</div>
        <div style="font-size:12px;margin-top:6px">NISA分 ${fmt(nisa)} ＋ 娯楽費 ${fmt(entertainment)}</div>
      </div>
      ${warnings.map(w=>`<div style="background:rgba(248,113,113,0.12);border:1px solid rgba(248,113,113,0.3);border-radius:10px;padding:10px 12px;font-size:12px;color:var(--red);margin-bottom:8px">${w}</div>`).join('')}
      <div style="display:flex;gap:10px;margin-top:4px">
        <button class="btn btn-ghost" style="flex:1" onclick="missionStep=1;renderMissionStep()">戻る</button>
        <button class="btn btn-p" style="flex:2" onclick="missionNext2(${transfer})">送金指示を確認 <i class="fa fa-check"></i></button>
      </div>`;
    window._missionTransfer=transfer;
  } else if(missionStep===3){
    body=`
      <div style="text-align:center;margin-bottom:20px">
        <div style="font-size:56px">🎉</div>
        <h3 style="font-size:20px;font-weight:900;margin:8px 0">作戦完了の確認</h3>
        <p style="color:var(--muted);font-size:14px">送金が完了したらチェックしてください</p>
      </div>
      <label style="display:flex;align-items:center;gap:12px;background:rgba(255,255,255,0.05);border-radius:12px;padding:14px;cursor:pointer;margin-bottom:20px">
        <input type="checkbox" id="miss-done-check" class="toggle" style="width:24px;height:24px">
        <span style="font-size:15px;font-weight:600">ことら送金が完了しました（${fmt(window._missionTransfer||0)}）</span>
      </label>
      <div style="display:flex;gap:10px">
        <button class="btn btn-ghost" style="flex:1" onclick="missionStep=2;renderMissionStep()">戻る</button>
        <button class="btn btn-g" style="flex:2" onclick="completeMission()"><i class="fa fa-rocket"></i> 作戦完了！</button>
      </div>`;
  }
  g('mission-content').innerHTML=`
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:18px">
      <h3 style="margin:0;font-size:17px;font-weight:800">🚀 15日作戦ウィザード</h3>
      <button class="btn btn-ghost btn-sm" onclick="closeMission()"><i class="fa fa-times"></i></button>
    </div>
    <div style="display:flex;align-items:flex-start;gap:8px;margin-bottom:20px">${stepDots}</div>
    ${body}`;
}

window.missionNext1=()=>{
  missionInc9=Number(g('miss-inc9')?.value||0);
  missionInc15=Number(g('miss-inc15')?.value||0);
  missionStep=2; renderMissionStep();
};

window.missionNext2=(transfer)=>{
  window._missionTransfer=transfer;
  missionStep=3; renderMissionStep();
};

window.completeMission=async()=>{
  if(!g('miss-done-check')?.checked){showToast('送金完了のチェックが必要です');return;}
  const base=db.collection('users').doc(S.uid);
  const defBank=getDefenseBank(), entBank=getEntBank();
  const transfer=window._missionTransfer||0;
  const batch=db.batch();
  // 送金取引を追加
  batch.set(base.collection('transactions').doc(),{date:jstToday(),type:'transfer',bankId:defBank?defBank.id:'',bankIdTo:entBank?entBank.id:'',amount:transfer,memo:'【15日作戦】ことら送金',status:'completed',isLending:false,excludeFromCalc:false,cardName:'',transferTarget:'external',createdAt:new Date().toISOString()});
  // 残高更新
  if(defBank&&transfer>0) batch.update(base.collection('banks').doc(defBank.id),{currentBalance:firebase.firestore.FieldValue.increment(-transfer)});
  if(entBank&&transfer>0) batch.update(base.collection('banks').doc(entBank.id),{currentBalance:firebase.firestore.FieldValue.increment(transfer)});
  // 収入設定更新・作戦記録
  batch.set(base.collection('settings').doc('main'),{income9:missionInc9,income15:missionInc15,lastMissionMonth:jstYM()},{merge:true});
  await batch.commit();
  closeMission();
  launchConfetti();
  showToast('🎉 作戦完了！資産が守られました');
};

// ========== PWA ==========
if('serviceWorker' in navigator){
  window.addEventListener('load',()=>navigator.serviceWorker.register('./sw.js').catch(()=>{}));
}
updateClock();
</script>
</body></html>
