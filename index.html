<html lang="ja">
<head>
<meta charset="UTF-8"/>

<link rel="apple-touch-icon" href="icons/icon-192.png"/>

<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&display=swap');
*{-webkit-tap-highlight-color:transparent;box-sizing:border-box;}
body{font-family:'Noto Sans JP',sans-serif;background:#080c14;color:#e2e8f0;min-height:100dvh;}
:root{
  --bg1:#080c14;--bg2:#0f1623;--bg3:#151e2e;--bg4:#1a2438;
  --bdr:rgba(255,255,255,0.07);
  --gold:#f0c060;--green:#34d399;--red:#f87171;--blue:#60a5fa;
  --purple:#a78bfa;--amber:#fbbf24;--teal:#2dd4bf;
}
.card{background:var(--bg2);border:1px solid var(--bdr);border-radius:14px;overflow:hidden;}
.card-hd{padding:10px 14px;font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#4b5e7a;border-bottom:1px solid var(--bdr);display:flex;align-items:center;justify-content:space-between;}
.list-row{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;border-bottom:1px solid var(--bdr);}
.list-row:last-child{border-bottom:none;}
.inp{background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:8px;padding:9px 11px;color:#e2e8f0;font-size:14px;width:100%;outline:none;font-family:inherit;}
.inp:focus{border-color:rgba(96,165,250,0.5);}
select.inp option{background:#0f1623;}
.btn-p{background:linear-gradient(135deg,#3b82f6,#1d4ed8);color:#fff;font-weight:700;padding:9px 18px;border-radius:8px;font-size:14px;transition:opacity .15s;}
.btn-p:active{opacity:.8;}
.btn-s{background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.12);color:#e2e8f0;font-weight:600;padding:9px 18px;border-radius:8px;font-size:14px;}
.btn-d{background:rgba(239,68,68,0.15);border:1px solid rgba(239,68,68,0.3);color:#fca5a5;font-weight:600;padding:9px 18px;border-radius:8px;font-size:14px;}
.btn-add{background:rgba(59,130,246,0.15);border:1px solid rgba(59,130,246,0.3);color:#93c5fd;font-size:11px;font-weight:700;padding:3px 9px;border-radius:6px;}
.bsm{padding:3px 8px;border-radius:6px;font-size:11px;font-weight:600;}
.bsm-g{background:rgba(52,211,153,0.15);border:1px solid rgba(52,211,153,0.3);color:#6ee7b7;}
.bsm-y{background:rgba(100,116,139,0.2);border:1px solid rgba(100,116,139,0.3);color:#94a3b8;}
.bsm-r{background:rgba(239,68,68,0.15);border:1px solid rgba(239,68,68,0.3);color:#fca5a5;}
.bsm-teal{background:rgba(45,212,191,0.15);border:1px solid rgba(45,212,191,0.3);color:#5eead4;}
.tab-a{background:rgba(59,130,246,0.2);border:1px solid rgba(59,130,246,0.4);color:#93c5fd;font-weight:700;padding:7px 16px;border-radius:8px;font-size:13px;}
.tab-i{background:rgba(255,255,255,0.04);border:1px solid var(--bdr);color:#475569;font-weight:600;padding:7px 16px;border-radius:8px;font-size:13px;}
.nav-btn{display:flex;flex-direction:column;align-items:center;gap:2px;padding:6px 4px;flex:1;font-size:11px;font-weight:600;border-radius:8px;}
.nav-a{color:#60a5fa;}.nav-i{color:#2d3f55;}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,0.85);display:flex;align-items:flex-end;z-index:100;backdrop-filter:blur(8px);}
.modal-box{background:#0f1623;border:1px solid rgba(255,255,255,0.1);border-radius:20px 20px 0 0;padding:20px;width:100%;max-height:90dvh;overflow-y:auto;}
.lbl{font-size:11px;font-weight:700;color:#3d5070;margin-bottom:4px;display:block;letter-spacing:.05em;text-transform:uppercase;}
.empty{padding:24px;text-align:center;color:#1e2d40;font-size:13px;}
/* バーグラフ */
.bar-wrap{height:8px;background:rgba(255,255,255,0.05);border-radius:99px;overflow:hidden;margin-top:5px;}
.bar-fill{height:100%;border-radius:99px;transition:width .5s cubic-bezier(.4,0,.2,1);}
/* バッジ */
.tb{font-size:10px;font-weight:700;padding:2px 7px;border-radius:99px;}
.tb-cc{background:rgba(167,139,250,0.2);color:#c4b5fd;}
.tb-wd{background:rgba(248,113,113,0.2);color:#fca5a5;}
.tb-in{background:rgba(52,211,153,0.2);color:#6ee7b7;}
.tb-tr{background:rgba(96,165,250,0.2);color:#93c5fd;}
.tb-iv{background:rgba(251,191,36,0.2);color:#fde68a;}
.tb-ld{background:rgba(45,212,191,0.2);color:#5eead4;}
/* 立替バッジ */
.lending-tag{font-size:9px;font-weight:700;padding:1px 6px;border-radius:99px;background:rgba(45,212,191,0.15);border:1px solid rgba(45,212,191,0.3);color:#5eead4;}
/* トースト */
#toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);z-index:200;padding:9px 20px;border-radius:99px;font-size:13px;font-weight:600;transition:opacity .3s;pointer-events:none;white-space:nowrap;}
/* チェックボックス */
.chk-wrap{display:flex;align-items:center;gap:8px;padding:10px 0;}
.chk-wrap input[type=checkbox]{width:18px;height:18px;accent-color:#2dd4bf;cursor:pointer;}
/* 収入スケジュール表示 */
.income-sched{background:rgba(52,211,153,0.08);border:1px solid rgba(52,211,153,0.2);border-radius:10px;padding:10px 12px;font-size:12px;}
</style>
</head>
<body>

<!-- 銀行追加 -->

<!-- 銀行編集 -->

<!-- 固定費プリセット追加 -->
<div id="m-preset" class="modal-bg hidden">
  <div class="modal-box space-y-3">
    <div class="text-base font-bold text-white">固定費プリセットを追加</div>

<script type="module">
import{initializeApp}from'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import{getAuth,onAuthStateChanged,signInWithEmailAndPassword,createUserWithEmailAndPassword,signOut}from'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';
import{getFirestore,enableIndexedDbPersistence,collection,doc,addDoc,updateDoc,deleteDoc,setDoc,getDoc,query,orderBy,limit,onSnapshot,writeBatch}from'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

// =============================================
// 🔧 Firebase設定をここに入力してください
// =============================================
const firebaseConfig = {
  apiKey: "AIzaSyA4qpbwxpp8tEEWLCkNMPIYuDTN7G9cF3A",
  authDomain: "cash-manege.firebaseapp.com",
  projectId: "cash-manege",
  storageBucket: "cash-manege.firebasestorage.app",
  messagingSenderId: "529145553530",
  appId: "1:529145553530:web:d65452017ffb9c109b51c3"
};
// =============================================

const app=initializeApp(firebaseConfig);
const auth=getAuth(app);
const db=getFirestore(app);
enableIndexedDbPersistence(db).catch(()=>{});

// =========================================================
// ユーティリティ
// =========================================================
const jstNow=()=>new Date(Date.now()+9*3600000);
const jstToday=()=>jstNow().toISOString().slice(0,10);
const fmt=n=>new Intl.NumberFormat('ja-JP',{style:'currency',currency:'JPY'}).format(n||0);
const uPath=uid=>`users/${uid}`;
const cRef=(uid,c)=>collection(db,uPath(uid),c);
const dRef=(uid,c,id)=>doc(db,uPath(uid),c,id);
const pad=n=>String(n).padStart(2,'0');
const dateStr=(y,m,d)=>`${y}-${pad(m)}-${pad(d)}`;

// =========================================================
// 祝日キャッシュ
// =========================================================
let holidayCache={};// { "YYYY-MM-DD": true }

async function fetchHolidays(year){
  if(holidayCache[`_loaded_${year}`])return;
  try{
    const res=await fetch(`https://api.excelapi.org/datetime/holiday?year=${year}`);
    if(!res.ok)throw new Error();
    const data=await res.json();// ["YYYY-MM-DD", ...]
    if(Array.isArray(data))data.forEach(d=>{holidayCache[d]=true;});
    holidayCache[`_loaded_${year}`]=true;
  }catch{
    // APIが失敗してもアプリは動作継続（祝日考慮なしにフォールバック）
    holidayCache[`_loaded_${year}`]=true;
  }
}

function isHoliday(dateStr){return !!holidayCache[dateStr];}
function isWeekend(dateStr){const d=new Date(dateStr+'T00:00:00+09:00');const w=d.getDay();return w===0||w===6;}
function isNonWorkday(dateStr){return isWeekend(dateStr)||isHoliday(dateStr);}

// 指定日が休日なら「直前の平日」を返す
function prevWorkday(dateStr){
  let d=new Date(dateStr+'T00:00:00+09:00');
  d.setDate(d.getDate()-1);
  for(let i=0;i<7;i++){
    const s=d.toISOString().slice(0,10);
    if(!isNonWorkday(s))return s;
    d.setDate(d.getDate()-1);
  }
  return dateStr;
}

// 毎月9日（固定）と15日（祝休前倒し）の収入日を計算
async function calcIncomeSchedule(yearMonth){
  // yearMonth: "YYYY-MM"
  const[y,m]=yearMonth.split('-').map(Number);
  await fetchHolidays(y);
  const day9=dateStr(y,m,9);
  let day15=dateStr(y,m,15);
  if(isNonWorkday(day15))day15=prevWorkday(day15);
  return{day9,day15};
}

// =========================================================
// ステート
// =========================================================
let uid=null;
let S={banks:[],transactions:[],settings:{savingsGoal:0,nisaGoal:0,savingsBalance:0,nisaBalance:0,income9:0,income15:0},presets:[]};
let activeTab='dashboard';
let txTab='pending';
let unsubs=[];
// 今月・来月の収入スケジュール
let incomeSchedule={};

// =========================================================
// データ読み込み
// =========================================================
async function loadAll(u){
  unsubs.forEach(f=>f());unsubs=[];
  const listen=(col,key,sort)=>{
    const q=sort?query(cRef(u,col),orderBy(sort)):cRef(u,col);
    unsubs.push(onSnapshot(q,snap=>{S[key]=snap.docs.map(d=>({id:d.id,...d.data()}));renderAll();}));
  };
  listen('banks','banks','name');
  listen('presetFixedCosts','presets','name');
  const tq=query(cRef(u,'transactions'),orderBy('date','desc'),limit(50));
  unsubs.push(onSnapshot(tq,snap=>{S.transactions=snap.docs.map(d=>({id:d.id,...d.data()}));renderAll();}));
  const sd=await getDoc(doc(db,uPath(u),'settings','main'));
  if(sd.exists())S.settings={...S.settings,...sd.data()};

  // 祝日を今月・来月分プリロード
  const now=jstNow();
  const y=now.getFullYear();const m=now.getMonth()+1;
  await fetchHolidays(y);
  if(m===12)await fetchHolidays(y+1);else await fetchHolidays(y);
  // 今月・来月の収入スケジュール
  const thisMonth=`${y}-${pad(m)}`;
  const nextM=m===12?1:m+1;const nextY=m===12?y+1:y;
  const nextMonth=`${nextY}-${pad(nextM)}`;
  const[sched1,sched2]=await Promise.all([calcIncomeSchedule(thisMonth),calcIncomeSchedule(nextMonth)]);
  incomeSchedule={[thisMonth]:sched1,[nextMonth]:sched2};
  renderAll();
}

// =========================================================
// 計算ロジック
// =========================================================

// 「次回のクレカ引き落とし日」= pendingのcredit_cardで最も近い未来の日付
function nextPaymentDate(){
  const today=jstToday();
  const upcoming=[...new Set(S.transactions
    .filter(t=>t.status==='pending'&&t.type==='credit_card'&&t.date>=today)
    .map(t=>t.date))].sort();
  return upcoming.length?upcoming[0]:null;
}
// 「次々回のクレカ引き落とし日」= 2番目に近い日付
function secondNextPaymentDate(){
  const today=jstToday();
  const upcoming=[...new Set(S.transactions
    .filter(t=>t.status==='pending'&&t.type==='credit_card'&&t.date>=today)
    .map(t=>t.date))].sort();
  return upcoming.length>=2?upcoming[1]:null;
}

// 指定期間内の予定収入（自動スケジュール）
function scheduledIncomeUntil(targetDate){
  const today=jstToday();
  let total=0;
  const inc9=+S.settings.income9||0;
  const inc15=+S.settings.income15||0;
  Object.values(incomeSchedule).forEach(sched=>{
    if(sched.day9>=today&&sched.day9<=targetDate)total+=inc9;
    if(sched.day15>=today&&sched.day15<=targetDate)total+=inc15;
  });
  return total;
}

// 指定の引き落とし日までの余力を汎用計算
function calcFreeUntil(npd){
  const today=jstToday();
  const totalBal=S.banks.reduce((s,b)=>s+(+b.currentBalance||0),0);
  const goal=(+S.settings.savingsGoal||0)+(+S.settings.nisaGoal||0);

  if(!npd){
    const pendingOut=S.transactions
      .filter(t=>t.status==='pending'&&t.date>=today&&t.type!=='income')
      .reduce((s,t)=>s+(+t.amount||0),0);
    return{free:totalBal-pendingOut-goal,npd:null,incomeUntil:0};
  }

  const manualIncome=S.transactions
    .filter(t=>t.status==='pending'&&t.type==='income'&&t.date>=today&&t.date<=npd)
    .reduce((s,t)=>s+(+t.amount||0),0);
  const autoIncome=scheduledIncomeUntil(npd);
  const totalIncome=manualIncome+autoIncome;
  const totalOut=S.transactions
    .filter(t=>t.status==='pending'&&t.date>=today&&t.date<=npd&&t.type!=='income')
    .reduce((s,t)=>s+(+t.amount||0),0);
  const free=totalBal+totalIncome-totalOut-goal;
  return{free,npd,incomeUntil:totalIncome};
}

// 次回引き落とし日までの「真の余力」
function calcNextPaymentFree(){
  return calcFreeUntil(nextPaymentDate());
}
// 次々回引き落とし日までの「真の余力」
function calcSecondNextPaymentFree(){
  return calcFreeUntil(secondNextPaymentDate());
}

// 銀行別: 紐づくpending支出合計
function bankPendingOut(bankId){
  const today=jstToday();
  return S.transactions
    .filter(t=>t.status==='pending'&&t.bankId===bankId&&t.date>=today&&t.type!=='income')
    .reduce((s,t)=>s+(+t.amount||0),0);
}

// 立替内訳
function lendingBreakdown(){
  const today=jstToday();
  const pending=S.transactions.filter(t=>t.status==='pending'&&t.date>=today&&t.type!=='income');
  let real=0,lending=0;
  pending.forEach(t=>{const a=+t.amount||0;if(t.isLending)lending+=a;else real+=a;});
  return{real,lending};
}

const TL={credit_card:'クレカ',withdrawal:'出金',income:'収入',transfer:'振替',investment:'投資'};
const TC={credit_card:'tb-cc',withdrawal:'tb-wd',income:'tb-in',transfer:'tb-tr',investment:'tb-iv'};

function bankName(id){return(S.banks.find(b=>b.id===id)||{name:''}).name;}

function txRow(t,showActions=true){
  const today=jstToday();
  const canComplete=t.status==='pending'&&t.date<today;
  const isIncome=t.type==='income';
  const amtColor=isIncome?'text-emerald-400':'text-red-400';
  const sign=isIncome?'+':'-';
  const cardBadge=t.type==='credit_card'&&t.cardName
    ?`<span class="text-xs text-purple-300 font-semibold ml-1">[${t.cardName}]</span>`:'';
  const bankBadge=t.bankId
    ?`<span class="text-slate-500 text-xs ml-1">🏦${bankName(t.bankId)}</span>`:'';
  const lendBadge=t.isLending
    ?`<span class="lending-tag ml-1">立替</span>`:'';
  return`<div class="list-row flex-col items-start gap-1">
    <div class="flex w-full justify-between items-center">
      <div class="flex flex-wrap items-center gap-1">
        <span class="tb ${TC[t.type]}">${TL[t.type]}</span>
        ${cardBadge}${lendBadge}
        <span class="text-slate-500 text-xs">${t.date}</span>
        ${bankBadge}
      </div>
      <span class="${amtColor} font-bold text-sm">${sign}${fmt(t.amount)}</span>
    </div>
    ${t.memo?`<div class="text-slate-600 text-xs pl-1">${t.memo}</div>`:''}
    ${showActions?`<div class="flex gap-2 mt-1 w-full justify-end">
      ${canComplete?`<button onclick="completeTx('${t.id}')" class="bsm bsm-g">✓ 完了</button>`:''}
      <button onclick="openEditTx('${t.id}')" class="bsm bsm-y">編集</button>
      <button onclick="deleteTx('${t.id}')" class="bsm bsm-r">削除</button>
    </div>`:''}
  </div>`;
}

window.setTab=function(tab){
  activeTab=tab;
  ['dashboard','tx','acc','cfg'].forEach(t=>{
    document.getElementById(`pg-${t}`).classList.toggle('hidden',t!==tab);
  });
  document.querySelectorAll('.nav-btn').forEach(b=>{
    b.classList.toggle('nav-a',b.dataset.tab===tab);
    b.classList.toggle('nav-i',b.dataset.tab!==tab);
  });
  renderAll();
};
window.setTxTab=t=>{txTab=t;renderTx();};
window.openM=id=>document.getElementById(id).classList.remove('hidden');
window.closeM=id=>document.getElementById(id).classList.add('hidden');

// 種別変更時: クレカ名フィールド・立替フィールドの表示切替
window.onTxTypeChange=function(pfx){
  const type=document.getElementById(`${pfx}-type`).value;
  const cardWrap=document.getElementById(`${pfx}-card-wrap`);
  const lendWrap=document.getElementById(`${pfx}-lending-wrap`);
  if(cardWrap)cardWrap.classList.toggle('hidden',type!=='credit_card');
  // 収入の場合は立替非表示
  if(lendWrap)lendWrap.style.display=type==='income'?'none':'flex';
};

function populateBankSel(id){
  const el=document.getElementById(id);
  el.innerHTML=`<option value="">（未設定）</option>`+S.banks.map(b=>`<option value="${b.id}">${b.name}</option>`).join('');
}

window.openTxModal=function(){
  populateBankSel('tx-bank');
  onTxTypeChange('tx');
  document.getElementById('tx-lending').checked=false;
  openM('m-tx');
};

window.addTx=async function(){
  if(!uid)return;
  const date=document.getElementById('tx-date').value;
  const type=document.getElementById('tx-type').value;
  const amount=document.getElementById('tx-amount').value;
  const memo=document.getElementById('tx-memo').value;
  const bankId=document.getElementById('tx-bank').value;
  const cardName=type==='credit_card'?document.getElementById('tx-cardname').value:'';
  const isLending=type!=='income'&&document.getElementById('tx-lending').checked;
  if(!date||!amount)return toast('日付と金額を入力してください','err');
  await addDoc(cRef(uid,'transactions'),{
    date,type,amount:+amount,memo,bankId,cardName,isLending,
    status:'pending',createdAt:new Date().toISOString()
  });
  closeM('m-tx');
  document.getElementById('tx-amount').value='';
  document.getElementById('tx-memo').value='';
  document.getElementById('tx-cardname').value='';
  document.getElementById('tx-lending').checked=false;
  toast('取引を追加しました');
};

window.openEditTx=function(id){
  const t=S.transactions.find(x=>x.id===id);if(!t)return;
  populateBankSel('etx-bank');
  document.getElementById('etx-id').value=id;
  document.getElementById('etx-date').value=t.date;
  document.getElementById('etx-type').value=t.type;
  document.getElementById('etx-amount').value=t.amount;
  document.getElementById('etx-memo').value=t.memo||'';
  document.getElementById('etx-status').value=t.status;
  document.getElementById('etx-bank').value=t.bankId||'';
  document.getElementById('etx-cardname').value=t.cardName||'';
  document.getElementById('etx-lending').checked=!!t.isLending;
  onTxTypeChange('etx');
  openM('m-edit-tx');
};
window.saveEditTx=async function(){
  const id=document.getElementById('etx-id').value;
  const type=document.getElementById('etx-type').value;
  await updateDoc(dRef(uid,'transactions',id),{
    date:document.getElementById('etx-date').value,
    type,amount:+document.getElementById('etx-amount').value,
    memo:document.getElementById('etx-memo').value,
    status:document.getElementById('etx-status').value,
    bankId:document.getElementById('etx-bank').value,
    cardName:type==='credit_card'?document.getElementById('etx-cardname').value:'',
    isLending:type!=='income'&&document.getElementById('etx-lending').checked,
  });
  closeM('m-edit-tx');toast('取引を更新しました');
};
window.deleteTx=async function(id){
  if(!confirm('削除しますか？'))return;
  await deleteDoc(dRef(uid,'transactions',id));toast('削除しました');
};
window.completeTx=async function(id){
  const t=S.transactions.find(x=>x.id===id);if(!t)return;
  const batch=writeBatch(db);
  const bank=t.bankId?S.banks.find(b=>b.id===t.bankId):S.banks[0];
  if(bank){
    const a=+t.amount||0;const cur=+bank.currentBalance||0;
    batch.update(dRef(uid,'banks',bank.id),{currentBalance:t.type==='income'?cur+a:cur-a});
  }
  batch.update(dRef(uid,'transactions',id),{status:'completed'});
  await batch.commit();toast('取引を完了しました');
};

window.openPresetM=function(){populateBankSel('pr-bank');openM('m-preset');};
window.addPreset=async function(){
  const name=document.getElementById('pr-name').value.trim();

  });

window.deletePreset=async function(id){

  await deleteDoc(dRef(uid,'presetFixedCosts',id));
};
window.applyPresets=async function(){
  if(!S.presets.length)return;
  const today=jstToday();
  const batch=writeBatch(db);
  S.presets.forEach(p=>{
    const r=doc(cRef(uid,'transactions'));
    batch.set(r,{date:today,type:p.type,amount:+p.amount,memo:`[固定費] ${p.name}`,bankId:p.bankId||'',cardName:'',isLending:false,status:'pending',createdAt:new Date().toISOString()});
  });
  await batch.commit();toast(`${S.presets.length}件を一括追加しました`);
};

// エクスポート
window.exportData=async function(){
  const{getDocs,query:q2,orderBy:ob}=await import('https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js');
  const result={};
  for(const c of['banks','presetFixedCosts']){
    const snap=await getDocs(cRef(uid,c));
    result[c]=snap.docs.map(d=>({id:d.id,...d.data()}));
  }
  const txSnap=await getDocs(q2(cRef(uid,'transactions'),ob('date','desc')));
  result.transactions=txSnap.docs.map(d=>({id:d.id,...d.data()}));
  result.settings=S.settings;
  const blob=new Blob([JSON.stringify(result,null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);
  a.download=`moneyflow-${jstToday()}.json`;a.click();
  toast('エクスポートしました');
};

window.doSignOut=async function(){unsubs.forEach(f=>f());await signOut(auth);};

// トースト
function toast(msg,type='ok'){
  const el=document.getElementById('toast');
  el.textContent=msg;
  el.className=`fixed bottom-20 left-1/2 -translate-x-1/2 z-50 px-4 py-2 rounded-full text-sm font-semibold shadow-lg transition-opacity duration-300 ${type==='err'?'bg-red-600 text-white':'bg-emerald-600 text-white'}`;
  el.classList.remove('opacity-0');
  setTimeout(()=>el.classList.add('opacity-0'),2600);
}

// 認証
window.doLogin=async function(){
  try{await signInWithEmailAndPassword(auth,document.getElementById('a-email').value,document.getElementById('a-pass').value);}
  catch(e){authErr(e.code);}
};
window.doRegister=async function(){
  try{await createUserWithEmailAndPassword(auth,document.getElementById('a-email').value,document.getElementById('a-pass').value);}
  catch(e){authErr(e.code);}
};
function authErr(code){
  const m={'auth/invalid-email':'メールアドレスの形式が正しくありません','auth/wrong-password':'パスワードが違います','auth/user-not-found':'ユーザーが見つかりません','auth/email-already-in-use':'このメールアドレスは登録済みです','auth/weak-password':'パスワードは6文字以上にしてください'};
  document.getElementById('a-err').textContent=m[code]||'エラー: '+code;
}

onAuthStateChanged(auth,user=>{
  uid=user?user.uid:null;
  document.getElementById('auth-screen').classList.toggle('hidden',!!user);
  document.getElementById('app-screen').classList.toggle('hidden',!user);
  if(user)loadAll(user.uid);
  else S={banks:[],transactions:[],settings:{savingsGoal:0,nisaGoal:0,savingsBalance:0,nisaBalance:0,income9:0,income15:0},presets:[]};
});

document.getElementById('tx-date').value=jstToday();

if('serviceWorker'in navigator){
  window.addEventListener('load',()=>navigator.serviceWorker.register('sw.js').catch(()=>{}));
}
