<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover"/>
  <meta name="theme-color" content="#0b0f1a"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="MoneyFlow"/>
  <title>MoneyFlow</title>
  <link rel="manifest" href="manifest.json"/>
  <link rel="apple-touch-icon" href="icons/icon-192.png"/>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&display=swap');
    *{-webkit-tap-highlight-color:transparent;box-sizing:border-box;}
    body{font-family:'Noto Sans JP',sans-serif;background:#0b0f1a;color:#e2e8f0;min-height:100dvh;}
    :root{
      --bg1:#0b0f1a;--bg2:#111827;--bg3:#1a2235;--bg4:#1e2a3a;
      --border:rgba(255,255,255,0.07);
      --gold:#f0c060;--green:#34d399;--red:#f87171;--blue:#60a5fa;--purple:#a78bfa;--amber:#fbbf24;
    }
    .card{background:var(--bg2);border:1px solid var(--border);border-radius:14px;overflow:hidden;}
    .card-hd{padding:10px 14px;font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#64748b;border-bottom:1px solid var(--border);}
    .list-row{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;border-bottom:1px solid var(--border);}
    .list-row:last-child{border-bottom:none;}
    .inp{background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:8px;padding:9px 11px;color:#e2e8f0;font-size:14px;width:100%;outline:none;font-family:inherit;}
    .inp:focus{border-color:rgba(96,165,250,0.5);}
    select.inp option{background:#1a2235;}
    .btn-p{background:linear-gradient(135deg,#3b82f6,#1d4ed8);color:#fff;font-weight:700;padding:9px 18px;border-radius:8px;font-size:14px;}
    .btn-s{background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.12);color:#e2e8f0;font-weight:600;padding:9px 18px;border-radius:8px;font-size:14px;}
    .btn-d{background:rgba(239,68,68,0.15);border:1px solid rgba(239,68,68,0.3);color:#fca5a5;font-weight:600;padding:9px 18px;border-radius:8px;font-size:14px;}
    .btn-add{background:rgba(59,130,246,0.15);border:1px solid rgba(59,130,246,0.3);color:#93c5fd;font-size:11px;font-weight:700;padding:3px 9px;border-radius:6px;}
    .bsm{padding:3px 7px;border-radius:5px;font-size:11px;font-weight:600;}
    .bsm-g{background:rgba(52,211,153,0.15);border:1px solid rgba(52,211,153,0.3);color:#6ee7b7;}
    .bsm-y{background:rgba(100,116,139,0.2);border:1px solid rgba(100,116,139,0.3);color:#94a3b8;}
    .bsm-r{background:rgba(239,68,68,0.15);border:1px solid rgba(239,68,68,0.3);color:#fca5a5;}
    .tab-a{background:rgba(59,130,246,0.2);border:1px solid rgba(59,130,246,0.4);color:#93c5fd;font-weight:700;padding:7px 16px;border-radius:8px;font-size:13px;}
    .tab-i{background:rgba(255,255,255,0.04);border:1px solid var(--border);color:#475569;font-weight:600;padding:7px 16px;border-radius:8px;font-size:13px;}
    .nav-btn{display:flex;flex-direction:column;align-items:center;gap:2px;padding:6px;flex:1;font-size:11px;font-weight:600;border-radius:8px;transition:color .15s;}
    .nav-a{color:#60a5fa;} .nav-i{color:#334155;}
    .modal-bg{position:fixed;inset:0;background:rgba(0,0,0,0.8);display:flex;align-items:flex-end;z-index:100;backdrop-filter:blur(6px);}
    .modal-box{background:#111827;border:1px solid rgba(255,255,255,0.1);border-radius:18px 18px 0 0;padding:20px;width:100%;max-height:88dvh;overflow-y:auto;}
    .lbl{font-size:11px;font-weight:700;color:#475569;margin-bottom:4px;display:block;letter-spacing:.05em;}
    .empty{padding:24px;text-align:center;color:#334155;font-size:13px;}
    /* バーグラフ */
    .bank-bar-wrap{height:10px;background:rgba(255,255,255,0.06);border-radius:99px;overflow:hidden;margin-top:6px;}
    .bank-bar-used{height:100%;border-radius:99px;transition:width .4s;}
    /* バッジ */
    .type-badge{font-size:10px;font-weight:700;padding:2px 7px;border-radius:99px;}
    .tb-cc{background:rgba(167,139,250,0.2);color:#c4b5fd;}
    .tb-wd{background:rgba(248,113,113,0.2);color:#fca5a5;}
    .tb-in{background:rgba(52,211,153,0.2);color:#6ee7b7;}
    .tb-tr{background:rgba(96,165,250,0.2);color:#93c5fd;}
    .tb-iv{background:rgba(251,191,36,0.2);color:#fde68a;}
    /* トースト */
    #toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);z-index:200;padding:9px 20px;border-radius:99px;font-size:13px;font-weight:600;transition:opacity .3s;pointer-events:none;}
  </style>
</head>
<body>
<div id="toast" class="opacity-0"></div>

<!-- ===== 認証画面 ===== -->
<div id="auth-screen" class="min-h-dvh flex items-center justify-center px-5">
  <div class="w-full max-w-sm">
    <div class="text-center mb-8">
      <div class="text-5xl mb-3">💰</div>
      <h1 class="text-2xl font-black text-white tracking-tight">MoneyFlow</h1>
      <p class="text-slate-500 text-sm mt-1">キャッシュフロー管理</p>
    </div>
    <div class="card p-5 space-y-4">
      <div><label class="lbl">メールアドレス</label><input id="a-email" type="email" class="inp" placeholder="example@email.com"/></div>
      <div><label class="lbl">パスワード</label><input id="a-pass" type="password" class="inp" placeholder="6文字以上"/></div>
      <div id="a-err" class="text-red-400 text-xs min-h-4"></div>
      <button onclick="doLogin()" class="btn-p w-full py-3">ログイン</button>
      <button onclick="doRegister()" class="btn-s w-full py-3">新規登録</button>
    </div>
  </div>
</div>

<!-- ===== メインアプリ ===== -->
<div id="app-screen" class="hidden pb-20">

  <!-- ダッシュボード -->
  <div id="pg-dashboard">
    <div class="sticky top-0 z-10 bg-[#0b0f1a]/90 backdrop-blur px-4 pt-4 pb-3 border-b border-white/5 flex justify-between items-center">
      <h1 class="text-lg font-black text-white">💰 MoneyFlow</h1>
      <button onclick="openM('m-tx')" class="btn-p py-2 px-4 text-sm">＋ 取引追加</button>
    </div>
    <div id="dash-content" class="px-4 py-4 space-y-3"></div>
  </div>

  <!-- 取引 -->
  <div id="pg-tx" class="hidden">
    <div class="sticky top-0 z-10 bg-[#0b0f1a]/90 backdrop-blur px-4 pt-4 pb-3 border-b border-white/5 flex justify-between items-center">
      <h1 class="text-lg font-black text-white">📋 取引一覧</h1>
      <button onclick="openM('m-tx')" class="btn-p py-2 px-4 text-sm">＋ 追加</button>
    </div>
    <div id="tx-content" class="px-4 py-4"></div>
  </div>

  <!-- 口座管理 -->
  <div id="pg-acc" class="hidden">
    <div class="sticky top-0 z-10 bg-[#0b0f1a]/90 backdrop-blur px-4 pt-4 pb-3 border-b border-white/5">
      <h1 class="text-lg font-black text-white">🏦 口座管理</h1>
    </div>
    <div id="acc-content" class="px-4 py-4 space-y-3"></div>
  </div>

  <!-- 設定 -->
  <div id="pg-cfg" class="hidden">
    <div class="sticky top-0 z-10 bg-[#0b0f1a]/90 backdrop-blur px-4 pt-4 pb-3 border-b border-white/5">
      <h1 class="text-lg font-black text-white">⚙️ 設定</h1>
    </div>
    <div id="cfg-content" class="px-4 py-4 space-y-3"></div>
  </div>

  <!-- ボトムナビ -->
  <nav class="fixed bottom-0 left-0 right-0 bg-[#0b0f1a]/95 backdrop-blur border-t border-white/5 flex items-center px-2 pb-2 z-20">
    <button class="nav-btn nav-a" data-tab="dashboard" onclick="setTab('dashboard')"><span class="text-xl">🏠</span>ホーム</button>
    <button class="nav-btn nav-i" data-tab="tx" onclick="setTab('tx')"><span class="text-xl">📋</span>取引</button>
    <button class="nav-btn nav-i" data-tab="acc" onclick="setTab('acc')"><span class="text-xl">🏦</span>口座</button>
    <button class="nav-btn nav-i" data-tab="cfg" onclick="setTab('cfg')"><span class="text-xl">⚙️</span>設定</button>
  </nav>
</div>

<!-- ===== モーダル群 ===== -->

<!-- 取引追加 -->
<div id="m-tx" class="modal-bg hidden">
  <div class="modal-box space-y-3">
    <div class="text-base font-bold text-white mb-1">取引を追加</div>
    <div><label class="lbl">日付</label><input id="tx-date" type="date" class="inp"/></div>
    <div><label class="lbl">種別</label>
      <select id="tx-type" class="inp" onchange="onTxTypeChange()">
        <option value="credit_card">クレカ返済</option>
        <option value="withdrawal">出金</option>
        <option value="income">収入</option>
        <option value="transfer">振替</option>
        <option value="investment">投資</option>
      </select>
    </div>
    <div id="tx-card-wrap" class="hidden"><label class="lbl">カード種別</label><select id="tx-card" class="inp"></select></div>
    <div><label class="lbl">対象銀行口座</label><select id="tx-bank" class="inp"></select></div>
    <div><label class="lbl">金額（円）</label><input id="tx-amount" type="number" class="inp" placeholder="0"/></div>
    <div><label class="lbl">メモ（任意）</label><input id="tx-memo" type="text" class="inp" placeholder="メモ"/></div>
    <div class="flex gap-3 pt-1">
      <button onclick="closeM('m-tx')" class="btn-s flex-1">キャンセル</button>
      <button onclick="addTx()" class="btn-p flex-1">追加</button>
    </div>
  </div>
</div>

<!-- 取引編集 -->
<div id="m-edit-tx" class="modal-bg hidden">
  <div class="modal-box space-y-3">
    <div class="text-base font-bold text-white mb-1">取引を編集</div>
    <input id="etx-id" type="hidden"/>
    <div><label class="lbl">日付</label><input id="etx-date" type="date" class="inp"/></div>
    <div><label class="lbl">種別</label>
      <select id="etx-type" class="inp" onchange="onETxTypeChange()">
        <option value="credit_card">クレカ返済</option>
        <option value="withdrawal">出金</option>
        <option value="income">収入</option>
        <option value="transfer">振替</option>
        <option value="investment">投資</option>
      </select>
    </div>
    <div id="etx-card-wrap"><label class="lbl">カード種別</label><select id="etx-card" class="inp"></select></div>
    <div><label class="lbl">対象銀行口座</label><select id="etx-bank" class="inp"></select></div>
    <div><label class="lbl">金額（円）</label><input id="etx-amount" type="number" class="inp"/></div>
    <div><label class="lbl">メモ</label><input id="etx-memo" type="text" class="inp"/></div>
    <div><label class="lbl">ステータス</label>
      <select id="etx-status" class="inp">
        <option value="pending">未完了</option>
        <option value="completed">完了済</option>
      </select>
    </div>
    <div class="flex gap-3 pt-1">
      <button onclick="closeM('m-edit-tx')" class="btn-s flex-1">キャンセル</button>
      <button onclick="saveEditTx()" class="btn-p flex-1">保存</button>
    </div>
  </div>
</div>

<!-- 銀行追加 -->
<div id="m-bank" class="modal-bg hidden">
  <div class="modal-box space-y-3">
    <div class="text-base font-bold text-white mb-1">銀行口座を追加</div>
    <div><label class="lbl">口座名</label><input id="b-name" type="text" class="inp" placeholder="例: 三菱UFJ"/></div>
    <div><label class="lbl">現在残高（円）</label><input id="b-bal" type="number" class="inp" placeholder="0"/></div>
    <div class="flex gap-3 pt-1">
      <button onclick="closeM('m-bank')" class="btn-s flex-1">キャンセル</button>
      <button onclick="addBank()" class="btn-p flex-1">追加</button>
    </div>
  </div>
</div>

<!-- 銀行編集 -->
<div id="m-edit-bank" class="modal-bg hidden">
  <div class="modal-box space-y-3">
    <div class="text-base font-bold text-white mb-1">口座を編集</div>
    <input id="eb-id" type="hidden"/>
    <div><label class="lbl">口座名</label><input id="eb-name" type="text" class="inp"/></div>
    <div><label class="lbl">残高（円）</label><input id="eb-bal" type="number" class="inp"/></div>
    <div class="flex gap-3 pt-1">
      <button onclick="closeM('m-edit-bank')" class="btn-s flex-1">キャンセル</button>
      <button onclick="saveEditBank()" class="btn-p flex-1">保存</button>
    </div>
  </div>
</div>

<!-- カード追加 -->
<div id="m-card" class="modal-bg hidden">
  <div class="modal-box space-y-3">
    <div class="text-base font-bold text-white mb-1">カード種別を追加</div>
    <div><label class="lbl">カード名</label><input id="c-name" type="text" class="inp" placeholder="例: 楽天カード"/></div>
    <div class="flex gap-3 pt-1">
      <button onclick="closeM('m-card')" class="btn-s flex-1">キャンセル</button>
      <button onclick="addCard()" class="btn-p flex-1">追加</button>
    </div>
  </div>
</div>

<!-- 証券口座追加 -->
<div id="m-brok" class="modal-bg hidden">
  <div class="modal-box space-y-3">
    <div class="text-base font-bold text-white mb-1">証券口座を追加</div>
    <div><label class="lbl">口座名</label><input id="br-name" type="text" class="inp" placeholder="例: SBI証券"/></div>
    <div><label class="lbl">投資元本（円）</label><input id="br-inv" type="number" class="inp" placeholder="0"/></div>
    <div><label class="lbl">現在評価額（円）</label><input id="br-val" type="number" class="inp" placeholder="0"/></div>
    <div class="flex gap-3 pt-1">
      <button onclick="closeM('m-brok')" class="btn-s flex-1">キャンセル</button>
      <button onclick="addBrok()" class="btn-p flex-1">追加</button>
    </div>
  </div>
</div>

<!-- 証券口座編集 -->
<div id="m-edit-brok" class="modal-bg hidden">
  <div class="modal-box space-y-3">
    <div class="text-base font-bold text-white mb-1">証券口座を編集</div>
    <input id="ebr-id" type="hidden"/>
    <div><label class="lbl">口座名</label><input id="ebr-name" type="text" class="inp"/></div>
    <div><label class="lbl">投資元本（円）</label><input id="ebr-inv" type="number" class="inp"/></div>
    <div><label class="lbl">現在評価額（円）</label><input id="ebr-val" type="number" class="inp"/></div>
    <div class="flex gap-3 pt-1">
      <button onclick="closeM('m-edit-brok')" class="btn-s flex-1">キャンセル</button>
      <button onclick="saveEditBrok()" class="btn-p flex-1">保存</button>
    </div>
  </div>
</div>

<!-- 固定費プリセット追加 -->
<div id="m-preset" class="modal-bg hidden">
  <div class="modal-box space-y-3">
    <div class="text-base font-bold text-white mb-1">固定費プリセットを追加</div>
    <div><label class="lbl">項目名</label><input id="pr-name" type="text" class="inp" placeholder="例: 電気代"/></div>
    <div><label class="lbl">概算金額（円）</label><input id="pr-amount" type="number" class="inp" placeholder="0"/></div>
    <div><label class="lbl">種別</label>
      <select id="pr-type" class="inp">
        <option value="withdrawal">出金</option>
        <option value="credit_card">クレカ返済</option>
      </select>
    </div>
    <div><label class="lbl">引き落とし口座</label><select id="pr-bank" class="inp"></select></div>
    <div class="flex gap-3 pt-1">
      <button onclick="closeM('m-preset')" class="btn-s flex-1">キャンセル</button>
      <button onclick="addPreset()" class="btn-p flex-1">追加</button>
    </div>
  </div>
</div>

<script type="module">
import{initializeApp}from'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import{getAuth,onAuthStateChanged,signInWithEmailAndPassword,createUserWithEmailAndPassword,signOut}from'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';
import{getFirestore,enableIndexedDbPersistence,collection,doc,addDoc,updateDoc,deleteDoc,setDoc,getDoc,query,orderBy,limit,onSnapshot,writeBatch}from'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

// =============================================
// 🔧 Firebase設定をここに入力してください
// =============================================
const firebaseConfig={
  apiKey:"YOUR_API_KEY",
  authDomain:"YOUR_AUTH_DOMAIN",
  projectId:"YOUR_PROJECT_ID",
  storageBucket:"YOUR_STORAGE_BUCKET",
  messagingSenderId:"YOUR_MESSAGING_SENDER_ID",
  appId:"YOUR_APP_ID"
};
// =============================================

const app=initializeApp(firebaseConfig);
const auth=getAuth(app);
const db=getFirestore(app);
enableIndexedDbPersistence(db).catch(()=>{});

// ---- utils ----
const jstToday=()=>{const n=new Date();return new Date(n.getTime()+9*3600000).toISOString().slice(0,10);};
const fmt=n=>new Intl.NumberFormat('ja-JP',{style:'currency',currency:'JPY'}).format(n||0);
const uPath=uid=>`users/${uid}`;
const cRef=(uid,c)=>collection(db,uPath(uid),c);
const dRef=(uid,c,id)=>doc(db,uPath(uid),c,id);

// ---- state ----
let uid=null;
let S={banks:[],cards:[],brokerages:[],transactions:[],settings:{savingsGoal:0},presets:[]};
let activeTab='dashboard';
let txTab='pending';
let unsubs=[];

// ---- load ----
function loadAll(u){
  unsubs.forEach(f=>f());unsubs=[];
  const listen=(col,key,sort)=>{
    const q=sort?query(cRef(u,col),orderBy(sort)):cRef(u,col);
    unsubs.push(onSnapshot(q,snap=>{S[key]=snap.docs.map(d=>({id:d.id,...d.data()}));renderAll();}));
  };
  listen('banks','banks','name');
  listen('cardTypes','cards','name');
  listen('brokerages','brokerages','name');
  listen('presetFixedCosts','presets','name');
  const tq=query(cRef(u,'transactions'),orderBy('date','desc'),limit(50));
  unsubs.push(onSnapshot(tq,snap=>{S.transactions=snap.docs.map(d=>({id:d.id,...d.data()}));renderAll();}));
  getDoc(doc(db,uPath(u),'settings','main')).then(d=>{if(d.exists())S.settings=d.data();renderAll();});
}

// ---- calc ----
function calcFree(){
  const total=S.banks.reduce((s,b)=>s+(+b.currentBalance||0),0);
  const today=jstToday();
  const pending=S.transactions.filter(t=>t.status==='pending'&&t.date>=today).reduce((s,t)=>{
    const a=+t.amount||0;
    if(t.type==='income')return s-a;
    return s+a;
  },0);
  return total-pending-(+S.settings.savingsGoal||0);
}

function bankPending(bankId){
  const today=jstToday();
  return S.transactions.filter(t=>t.status==='pending'&&t.bankId===bankId&&t.date>=today&&t.type!=='income').reduce((s,t)=>s+(+t.amount||0),0);
}

// ---- render ----
function renderAll(){
  if(activeTab==='dashboard')renderDash();
  if(activeTab==='tx')renderTx();
  if(activeTab==='acc')renderAcc();
  if(activeTab==='cfg')renderCfg();
}

// type labels/colors
const TL={credit_card:'クレカ',withdrawal:'出金',income:'収入',transfer:'振替',investment:'投資'};
const TC={credit_card:'tb-cc',withdrawal:'tb-wd',income:'tb-in',transfer:'tb-tr',investment:'tb-iv'};
const isExpense=t=>['credit_card','withdrawal','investment','transfer'].includes(t);

function cardName(cardId){const c=S.cards.find(x=>x.id===cardId);return c?c.name:'';}
function bankName(bankId){const b=S.banks.find(x=>x.id===bankId);return b?b.name:'';}

function txRow(t,showActions=true){
  const today=jstToday();
  const canComplete=t.status==='pending'&&t.date<today;
  const amtColor=t.type==='income'?'text-emerald-400':'text-red-400';
  const sign=t.type==='income'?'+':'-';
  const cardInfo=t.type==='credit_card'&&t.cardId?`<span class="ml-1 text-xs text-purple-300 font-semibold">[${cardName(t.cardId)}]</span>`:'';
  const bankInfo=t.bankId?`<span class="text-xs text-slate-500 ml-1">🏦${bankName(t.bankId)}</span>`:'';
  return `<div class="list-row flex-col items-start gap-1">
    <div class="flex w-full justify-between items-center">
      <div class="flex flex-wrap items-center gap-1">
        <span class="type-badge ${TC[t.type]}">${TL[t.type]}</span>
        ${cardInfo}
        <span class="text-slate-400 text-xs">${t.date}</span>
        ${bankInfo}
      </div>
      <span class="${amtColor} font-bold text-sm">${sign}${fmt(t.amount)}</span>
    </div>
    ${t.memo?`<div class="text-slate-500 text-xs pl-1">${t.memo}</div>`:''}
    ${showActions?`<div class="flex gap-2 mt-1 w-full justify-end">
      ${canComplete?`<button onclick="completeTx('${t.id}')" class="bsm bsm-g">✓ 完了</button>`:''}

    </div>`:''}
  </div>`;
}

    const bal=+b.currentBalance||0;
    const pend=bankPending(b.id);

    const over=pend>bal;
    const barColor=over?'#f87171':pct>75?'#fbbf24':'#34d399';
    const remain=bal-pend;
    return `<div class="p-3 border-b border-white/5 last:border-0">
      <div class="flex justify-between items-center mb-1">
        <span class="text-slate-200 text-sm font-semibold">${b.name}</span>

      </div>
      ${over?`<div class="text-xs text-red-400 mt-1 font-bold">⚠ 残高不足のリスクがあります</div>`:''}

      <div class="p-4">
        <div class="text-xs text-slate-500 mb-1 tracking-widest uppercase">今月の自由枠（真の余力）</div>
        <div class="text-4xl font-black ${isNeg?'text-red-400':'text-emerald-300'} tracking-tight">${fmt(free)}</div>
        ${isNeg?`<div class="text-red-400 text-xs mt-1 font-semibold">⚠ 資金ショートのリスクがあります</div>`:''}
        <div class="text-slate-600 text-xs mt-2">全残高 − 未決済支出 − 貯金/NISA目標</div>
        <div class="grid grid-cols-3 gap-2 mt-3">
          <div class="bg-white/5 rounded-xl p-2 text-center">
            <div class="text-slate-400 text-xs">全口座残高</div>
            <div class="text-white text-sm font-bold">${fmt(totalBal)}</div>
          </div>
          <div class="bg-white/5 rounded-xl p-2 text-center">
            <div class="text-slate-400 text-xs">貯金/NISA目標</div>
            <div class="text-amber-300 text-sm font-bold">${fmt(goal)}</div>
          </div>
          <div class="bg-white/5 rounded-xl p-2 text-center">
            <div class="text-slate-400 text-xs">未決済件数</div>
            <div class="text-blue-300 text-sm font-bold">${pendingTxs.length}件</div>
          </div>
        </div>
      </div>
    </div>

    <!-- 銀行別支払い余力 -->
    <div class="card">
      <div class="card-hd">🏦 銀行別 支払い余力</div>
      ${S.banks.length===0?`<div class="empty">口座が登録されていません</div>`:bankBars}
    </div>

    <!-- 直近の未決済取引 -->
    <div class="card">
      <div class="card-hd">⏳ 直近の未決済取引</div>
      ${pendingTxs.slice(0,5).length===0?`<div class="empty">未決済取引なし</div>`:
        pendingTxs.slice(0,5).map(t=>txRow(t,false)).join('')}
    </div>

    <!-- 証券口座 -->
    <div class="card">
      <div class="card-hd">📈 証券口座</div>
      ${S.brokerages.length===0?`<div class="empty">証券口座未登録</div>`:
        S.brokerages.map(b=>{
          const gain=(+b.currentValuation||0)-(+b.totalInvestment||0);
          return`<div class="list-row flex-col items-start gap-1">
            <div class="flex w-full justify-between"><span class="text-slate-200">${b.name}</span><span class="text-white font-bold">${fmt(b.currentValuation)}</span></div>
            <div class="flex w-full justify-between text-xs"><span class="text-slate-500">元本: ${fmt(b.totalInvestment)}</span><span class="${gain>=0?'text-emerald-400':'text-red-400'}">${gain>=0?'+':''}${fmt(gain)}</span></div>

window.setTab=function(tab){

  ['dashboard','tx','acc','cfg'].forEach(t=>document.getElementById(`pg-${t}`).classList.toggle('hidden',t!==tab));
  document.querySelectorAll('.nav-btn').forEach(b=>{
    b.classList.toggle('nav-a',b.dataset.tab===tab);
    b.classList.toggle('nav-i',b.dataset.tab!==tab);
  });

};

window.openM=function(id){document.getElementById(id).classList.remove('hidden');};

window.addTx=async function(){
  if(!uid)return;
  const date=document.getElementById('tx-date').value;
  const type=document.getElementById('tx-type').value;
  const amount=document.getElementById('tx-amount').value;
  const memo=document.getElementById('tx-memo').value;
  const bankId=document.getElementById('tx-bank').value;
  const cardId=type==='credit_card'?document.getElementById('tx-card').value:'';
  if(!date||!amount)return toast('日付と金額を入力してください','err');
  await addDoc(cRef(uid,'transactions'),{date,type,amount:+amount,memo,bankId,cardId,status:'pending',createdAt:new Date().toISOString()});
  closeM('m-tx');
  document.getElementById('tx-amount').value='';
  document.getElementById('tx-memo').value='';
  toast('取引を追加しました');
};

window.openEditTx=function(id){
  const t=S.transactions.find(x=>x.id===id);if(!t)return;
  populateBankSelect('etx-bank');populateCardSelect('etx-card');
  document.getElementById('etx-id').value=id;
  document.getElementById('etx-date').value=t.date;
  document.getElementById('etx-type').value=t.type;
  document.getElementById('etx-amount').value=t.amount;
  document.getElementById('etx-memo').value=t.memo||'';
  document.getElementById('etx-status').value=t.status;
  document.getElementById('etx-bank').value=t.bankId||'';
  document.getElementById('etx-card').value=t.cardId||'';
  onETxTypeChange();
  openM('m-edit-tx');
};
window.saveEditTx=async function(){
  const id=document.getElementById('etx-id').value;
  const type=document.getElementById('etx-type').value;
  await updateDoc(dRef(uid,'transactions',id),{
    date:document.getElementById('etx-date').value,
    type,amount:+document.getElementById('etx-amount').value,
    memo:document.getElementById('etx-memo').value,
    status:document.getElementById('etx-status').value,
    bankId:document.getElementById('etx-bank').value,
    cardId:type==='credit_card'?document.getElementById('etx-card').value:'',
  });
  closeM('m-edit-tx');toast('取引を更新しました');
};
window.deleteTx=async function(id){
  if(!confirm('削除しますか？'))return;
  await deleteDoc(dRef(uid,'transactions',id));toast('削除しました');
};
window.completeTx=async function(id){
  const t=S.transactions.find(x=>x.id===id);if(!t)return;
  const batch=writeBatch(db);
  const bank=t.bankId?S.banks.find(b=>b.id===t.bankId):S.banks[0];
  if(bank){
    const a=+t.amount||0;
    const cur=+bank.currentBalance||0;
    const newBal=t.type==='income'?cur+a:cur-a;
    batch.update(dRef(uid,'banks',bank.id),{currentBalance:newBal});
  }
  batch.update(dRef(uid,'transactions',id),{status:'completed'});
  await batch.commit();toast('取引を完了しました');
};

window.applyPresets=async function(){

  const today=jstToday();
  const batch=writeBatch(db);
  S.presets.forEach(p=>{
    const r=doc(cRef(uid,'transactions'));
    batch.set(r,{date:today,type:p.type,amount:+p.amount,memo:`[固定費] ${p.name}`,bankId:p.bankId||'',cardId:'',status:'pending',createdAt:new Date().toISOString()});

// エクスポート
window.exportData=async function(){
  const result={};
  for(const c of['banks','cardTypes','brokerages','presetFixedCosts']){
    const snap=await(await import('https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js')).getDocs(cRef(uid,c));
    result[c]=snap.docs.map(d=>({id:d.id,...d.data()}));
  }
  const{getDocs:gd,query:q2,orderBy:ob}=await import('https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js');
  const txSnap=await gd(q2(cRef(uid,'transactions'),ob('date','desc')));
  result.transactions=txSnap.docs.map(d=>({id:d.id,...d.data()}));
  result.settings=S.settings;
  const blob=new Blob([JSON.stringify(result,null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=`moneyflow-${jstToday()}.json`;a.click();
  toast('エクスポートしました');
};

window.doSignOut=async function(){unsubs.forEach(f=>f());await signOut(auth);};

// toast
function toast(msg,type='ok'){
  const el=document.getElementById('toast');
  el.textContent=msg;
  el.className=`fixed bottom-20 left-1/2 -translate-x-1/2 z-50 px-4 py-2 rounded-full text-sm font-semibold shadow-lg transition-opacity duration-300 ${type==='err'?'bg-red-600 text-white':'bg-emerald-600 text-white'}`;
  el.classList.remove('opacity-0');
  setTimeout(()=>el.classList.add('opacity-0'),2500);
}

// 認証
window.doLogin=async function(){
  const email=document.getElementById('a-email').value;
  const pass=document.getElementById('a-pass').value;
  try{await signInWithEmailAndPassword(auth,email,pass);}catch(e){authErr(e.code);}
};
window.doRegister=async function(){
  const email=document.getElementById('a-email').value;
  const pass=document.getElementById('a-pass').value;
  try{await createUserWithEmailAndPassword(auth,email,pass);}catch(e){authErr(e.code);}
};
function authErr(code){
  const m={'auth/invalid-email':'メールアドレスの形式が正しくありません','auth/wrong-password':'パスワードが違います','auth/user-not-found':'ユーザーが見つかりません','auth/email-already-in-use':'このメールアドレスは登録済みです','auth/weak-password':'パスワードは6文字以上にしてください'};
  document.getElementById('a-err').textContent=m[code]||'エラー: '+code;
}

onAuthStateChanged(auth,user=>{
  uid=user?user.uid:null;
  document.getElementById('auth-screen').classList.toggle('hidden',!!user);
  document.getElementById('app-screen').classList.toggle('hidden',!user);
  if(user){loadAll(user.uid);}
  else{S={banks:[],cards:[],brokerages:[],transactions:[],settings:{savingsGoal:0},presets:[]};}
});

document.getElementById('tx-date').value=jstToday();

}
