<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover" />
    <meta name="theme-color" content="#0b0f19" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="MoneyFlow" />
    <title>MoneyFlow - 未来型キャッシュフロー</title>
    <link rel="manifest" href="manifest.json" />
    <link rel="apple-touch-icon" href="icons/icon-192.png" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
        * {
            -webkit-tap-highlight-color: transparent;
            box-sizing: border-box;
        }
        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: #0b0f19;
            color: #e2e8f0;
            min-height: 100dvh;
            overflow-x: hidden;
        }
        :root {
            --glass-bg: rgba(15, 23, 42, 0.7);
            --glass-border: rgba(255, 255, 255, 0.08);
            --glass-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            --neon-blue: #38bdf8;
            --neon-green: #4ade80;
            --neon-red: #f87171;
            --neon-purple: #a78bfa;
            --neon-gold: #fbbf24;
            --neon-teal: #2dd4bf;
            --defense-bar-gradient: linear-gradient(90deg, #f87171, #fbbf24, #4ade80);
        }
        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            box-shadow: var(--glass-shadow);
        }
        .gauge-bg {
            background: rgba(255,255,255,0.05);
            border-radius: 999px;
            overflow: hidden;
            height: 14px;
        }
        .gauge-fill {
            height: 100%;
            border-radius: 999px;
            transition: width 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            background: var(--defense-bar-gradient);
        }
        .btn-primary {
            background: linear-gradient(135deg, #0284c7, #38bdf8);
            box-shadow: 0 4px 14px 0 rgba(56, 189, 248, 0.35);
            color: white;
            font-weight: 600;
            padding: 10px 20px;
            border-radius: 12px;
            transition: all 0.2s;
        }
        .btn-primary:active { transform: scale(0.97); opacity: 0.9; }
        .mission-btn {
            background: linear-gradient(135deg, #7c3aed, #a78bfa);
            box-shadow: 0 0 20px rgba(167,139,250,0.6);
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(167,139,250,0.7); }
            70% { box-shadow: 0 0 0 15px rgba(167,139,250,0); }
            100% { box-shadow: 0 0 0 0 rgba(167,139,250,0); }
        }
        .input-glass {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            padding: 10px 14px;
            color: white;
            width: 100%;
            outline: none;
            transition: border 0.2s;
        }
        .input-glass:focus { border-color: rgba(56,189,248,0.6); }
        select.input-glass option { background: #1e293b; }
        .toast {
            position: fixed;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 200;
            padding: 10px 24px;
            border-radius: 999px;
            font-size: 14px;
            font-weight: 600;
            transition: opacity 0.3s;
            pointer-events: none;
            white-space: nowrap;
        }
        .modal {
            transition: opacity 0.2s;
        }
        .tab-active {
            background: rgba(56, 189, 248, 0.15);
            border: 1px solid rgba(56, 189, 248, 0.4);
            color: #bae6fd;
        }
        .nav-btn i { font-size: 1.4rem; }
    </style>
</head>
<body class="antialiased">

<!-- Toast -->
<div id="toast" class="toast opacity-0 bg-emerald-500 text-white"></div>

<!-- ========== 認証画面 ========== -->
<div id="auth-screen" class="min-h-screen flex items-center justify-center px-4 bg-gradient-to-b from-[#0b0f19] via-[#131c2e] to-[#0b0f19]">
    <div class="w-full max-w-md glass-card p-8 space-y-6">
        <div class="text-center">
            <div class="text-6xl mb-3">💰</div>
            <h1 class="text-3xl font-black text-white tracking-tight">MoneyFlow</h1>
            <p class="text-slate-400 text-sm mt-1">未来型キャッシュフロー・ダッシュボード</p>
        </div>
        <div><label class="block text-xs font-semibold text-slate-400 mb-1">メールアドレス</label><input id="a-email" type="email" class="input-glass" placeholder="example@email.com" /></div>
        <div><label class="block text-xs font-semibold text-slate-400 mb-1">パスワード</label><input id="a-pass" type="password" class="input-glass" placeholder="6文字以上" /></div>
        <div id="a-err" class="text-red-400 text-xs min-h-[20px]"></div>
        <button onclick="doLogin()" class="btn-primary w-full py-3">ログイン</button>
        <button onclick="doRegister()" class="w-full py-3 bg-white/5 border border-white/10 rounded-xl text-white font-semibold">新規登録</button>
    </div>
</div>

<!-- ========== メインアプリ ========== -->
<div id="app-screen" class="hidden pb-24">

    <!-- ヘッダー -->
    <div class="sticky top-0 z-10 bg-[#0b0f19]/80 backdrop-blur-xl border-b border-white/5 px-4 py-3 flex justify-between items-center">
        <div>
            <h1 class="text-xl font-black text-white flex items-center gap-2"><span class="text-2xl">💰</span> MoneyFlow</h1>
            <div id="jst-clock" class="text-xs text-slate-500 mt-0.5">-- : -- : -- JST</div>
        </div>
        <div class="flex gap-2">
            <button onclick="openMissionModal()" id="mission-trigger-btn" class="hidden btn-primary mission-btn text-sm py-2 px-4"><i class="fas fa-rocket mr-1"></i> 作戦</button>
            <button onclick="openTxModal()" class="btn-primary text-sm py-2 px-4"><i class="fas fa-plus mr-1"></i> 取引</button>
        </div>
    </div>

    <!-- タブコンテンツ -->
    <div id="pg-dashboard" class="px-4 py-4 space-y-4"></div>
    <div id="pg-tx" class="hidden px-4 py-4"></div>
    <div id="pg-acc" class="hidden px-4 py-4"></div>
    <div id="pg-rec" class="hidden px-4 py-4"></div>
    <div id="pg-cfg" class="hidden px-4 py-4"></div>

    <!-- ボトムナビ -->
    <nav class="fixed bottom-0 left-0 right-0 bg-[#0b0f19]/90 backdrop-blur-xl border-t border-white/5 flex items-center px-2 pb-2 pt-1 z-20">
        <button class="nav-btn flex flex-col items-center gap-0.5 flex-1 py-1 rounded-xl text-xs font-semibold text-slate-500" data-tab="dashboard" onclick="setTab('dashboard')"><i class="fas fa-home text-lg"></i>ホーム</button>
        <button class="nav-btn flex flex-col items-center gap-0.5 flex-1 py-1 rounded-xl text-xs font-semibold text-slate-500" data-tab="tx" onclick="setTab('tx')"><i class="fas fa-list text-lg"></i>取引</button>
        <button class="nav-btn flex flex-col items-center gap-0.5 flex-1 py-1 rounded-xl text-xs font-semibold text-slate-500" data-tab="acc" onclick="setTab('acc')"><i class="fas fa-university text-lg"></i>口座</button>
        <button class="nav-btn flex flex-col items-center gap-0.5 flex-1 py-1 rounded-xl text-xs font-semibold text-slate-500" data-tab="rec" onclick="setTab('rec')"><i class="fas fa-chart-bar text-lg"></i>記録</button>
        <button class="nav-btn flex flex-col items-center gap-0.5 flex-1 py-1 rounded-xl text-xs font-semibold text-slate-500" data-tab="cfg" onclick="setTab('cfg')"><i class="fas fa-cog text-lg"></i>設定</button>
    </nav>
</div>

<!-- ========== モーダル群 ========== -->
<!-- 取引追加 -->
<div id="m-tx" class="modal fixed inset-0 z-50 bg-black/80 backdrop-blur-md hidden flex items-end sm:items-center justify-center">
    <div class="glass-card w-full max-w-lg mx-4 mb-4 sm:mb-0 p-5 space-y-3 max-h-[90vh] overflow-y-auto">
        <div class="flex justify-between items-center"><h3 class="text-lg font-bold text-white">取引を追加</h3><button onclick="closeM('m-tx')" class="text-slate-400 text-2xl">&times;</button></div>
        <div id="tx-form-content"></div>
    </div>
</div>
<!-- 取引編集 -->
<div id="m-edit-tx" class="modal fixed inset-0 z-50 bg-black/80 backdrop-blur-md hidden flex items-end sm:items-center justify-center">
    <div class="glass-card w-full max-w-lg mx-4 mb-4 sm:mb-0 p-5 space-y-3 max-h-[90vh] overflow-y-auto">
        <div class="flex justify-between items-center"><h3 class="text-lg font-bold text-white">取引を編集</h3><button onclick="closeM('m-edit-tx')" class="text-slate-400 text-2xl">&times;</button></div>
        <div id="etx-form-content"></div>
    </div>
</div>
<!-- 口座追加 -->
<div id="m-bank" class="modal fixed inset-0 z-50 bg-black/80 backdrop-blur-md hidden flex items-end sm:items-center justify-center">
    <div class="glass-card w-full max-w-md mx-4 mb-4 sm:mb-0 p-5 space-y-3">
        <div class="flex justify-between items-center"><h3 class="text-lg font-bold text-white">口座を追加</h3><button onclick="closeM('m-bank')" class="text-slate-400 text-2xl">&times;</button></div>
        <div id="bank-form-content"></div>
    </div>
</div>
<!-- 口座編集 -->
<div id="m-edit-bank" class="modal fixed inset-0 z-50 bg-black/80 backdrop-blur-md hidden flex items-end sm:items-center justify-center">
    <div class="glass-card w-full max-w-md mx-4 mb-4 sm:mb-0 p-5 space-y-3">
        <div class="flex justify-between items-center"><h3 class="text-lg font-bold text-white">口座を編集</h3><button onclick="closeM('m-edit-bank')" class="text-slate-400 text-2xl">&times;</button></div>
        <div id="ebank-form-content"></div>
    </div>
</div>
<!-- 固定費プリセット追加 -->
<div id="m-preset" class="modal fixed inset-0 z-50 bg-black/80 backdrop-blur-md hidden flex items-end sm:items-center justify-center">
    <div class="glass-card w-full max-w-md mx-4 mb-4 sm:mb-0 p-5 space-y-3">
        <div class="flex justify-between items-center"><h3 class="text-lg font-bold text-white">固定費プリセット追加</h3><button onclick="closeM('m-preset')" class="text-slate-400 text-2xl">&times;</button></div>
        <div id="preset-form-content"></div>
    </div>
</div>
<!-- 15日作戦ウィザード -->
<div id="m-mission" class="modal fixed inset-0 z-50 bg-black/90 backdrop-blur-md hidden flex items-center justify-center">
    <div class="glass-card w-full max-w-lg mx-4 p-6 space-y-4 border border-purple-500/30">
        <div class="flex justify-between items-center"><h3 class="text-xl font-black text-white"><i class="fas fa-rocket text-purple-400 mr-2"></i>15日の作戦行動</h3><button onclick="closeM('m-mission')" class="text-slate-400 text-2xl">&times;</button></div>
        <div id="mission-step-1" class="space-y-3 wizard-step-active">
            <p class="text-sm text-slate-300">今月の収入を入力してください</p>
            <div><label class="block text-xs font-semibold text-slate-400 mb-1">9日の仕送り額（円）</label><input id="miss-inc9" type="number" class="input-glass" placeholder="0" /></div>
            <div><label class="block text-xs font-semibold text-slate-400 mb-1">15日のバイト代（円）</label><input id="miss-inc15" type="number" class="input-glass" placeholder="0" /></div>
            <button onclick="missionNext()" class="btn-primary w-full">次へ <i class="fas fa-arrow-right"></i></button>
        </div>
        <div id="mission-step-2" class="space-y-3 wizard-step-hidden">
            <div id="mission-result" class="text-sm text-slate-300"></div>
            <button onclick="missionConfirm()" class="btn-primary w-full bg-purple-600">送金指示を確認 <i class="fas fa-check"></i></button>
        </div>
        <div id="mission-step-3" class="wizard-step-hidden space-y-4 text-center">
            <div class="text-5xl">🎉</div>
            <p class="text-lg font-bold text-white">作戦完了！</p>
            <p class="text-sm text-slate-400">ことら送金を実行し、チェックしてください</p>
            <div class="flex items-center justify-center gap-3 mt-3">
                <input type="checkbox" id="miss-done-check" class="w-5 h-5 accent-purple-500" />
                <label for="miss-done-check" class="text-white">送金完了しました</label>
            </div>
            <button onclick="missionComplete()" class="btn-primary w-full bg-emerald-500">完了！</button>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
    import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';
    import { initializeFirestore, persistentLocalCache, collection, doc, addDoc, updateDoc, deleteDoc, setDoc, getDoc, query, orderBy, limit, onSnapshot, writeBatch } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

    // ---- Firebase設定（実際の値に置き換えてください）----
    const firebaseConfig = {
        apiKey: "AIzaSyA4qpbwxpp8tEEWLCkNMPIYuDTN7G9cF3A",
        authDomain: "cash-manege.firebaseapp.com",
        projectId: "cash-manege",
        storageBucket: "cash-manege.firebasestorage.app",
        messagingSenderId: "529145553530",
        appId: "1:529145553530:web:d65452017ffb9c109b51c3"
    };
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = initializeFirestore(app, { localCache: persistentLocalCache() });

    // ---------- ユーティリティ ----------
    const jstNow = () => new Date(Date.now() + 9 * 3600000);
    const jstToday = () => jstNow().toISOString().slice(0, 10);
    const fmt = n => new Intl.NumberFormat('ja-JP', { style: 'currency', currency: 'JPY' }).format(n || 0);
    const pad = n => String(n).padStart(2, '0');

    // 口座名判定
    const isMUFG = (name) => name && (name.includes('三菱UFJ') || name.toUpperCase().includes('MUFG'));
    const isSMBC = (name) => name && (name.includes('三井住友') || name.toUpperCase().includes('SMBC'));
    const isSBI = (name) => name && (name.includes('住信SBI') || name.toUpperCase().includes('SBI'));

    // ---------- グローバルステート ----------
    let uid = null;
    let S = {
        banks: [],
        transactions: [],
        settings: {
            savingsGoal: 0,
            nisaGoal: 0,
            savingsBalance: 0,
            nisaBalance: 0,
            income9: 0,
            income15: 0,
            defenseLine: 150000,
            lastMissionMonth: null,
            nextIncome9: 0,
            nextIncome15: 0
        },
        presets: []
    };
    let activeTab = 'dashboard';
    let txTab = 'pending';
    let unsubs = [];
    let incomeSchedule = {};
    let transferTargetState = { tx: 'self', etx: 'self' };

    // ---------- Firebaseデータ購読 ----------
    async function loadAll(u) {
        unsubs.forEach(f => f()); unsubs = [];
        const listen = (col, key, sort) => {
            const q = sort ? query(collection(db, `users/${u}/${col}`), orderBy(sort)) : collection(db, `users/${u}/${col}`);
            unsubs.push(onSnapshot(q, snap => {
                S[key] = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                renderAll();
            }));
        };
        listen('banks', 'banks', 'name');
        listen('presetFixedCosts', 'presets', 'name');
        const tq = query(collection(db, `users/${u}/transactions`), orderBy('date', 'desc'), limit(80));
        unsubs.push(onSnapshot(tq, snap => { S.transactions = snap.docs.map(d => ({ id: d.id, ...d.data() })); renderAll(); }));
        const sd = await getDoc(doc(db, `users/${u}/settings`, 'main'));
        if (sd.exists()) S.settings = { ...S.settings, ...sd.data() };
        updateIncomeSchedule();
        renderAll();
    }

    function updateIncomeSchedule() {
        const now = jstNow();
        const y = now.getFullYear();
        const m = now.getMonth() + 1;
        const thisMonth = `${y}-${pad(m)}`;
        const nextM = m === 12 ? 1 : m + 1;
        const nextY = m === 12 ? y + 1 : y;
        const nextMonth = `${nextY}-${pad(nextM)}`;
        incomeSchedule[thisMonth] = { day9: `${thisMonth}-09`, day15: `${thisMonth}-15` };
        incomeSchedule[nextMonth] = { day9: `${nextMonth}-09`, day15: `${nextMonth}-15` };
    }

    // ---------- 口座・余力計算 ----------
    function getAccount(id) { return S.banks.find(b => b.id === id); }
    function getMUFGAccount() { return S.banks.find(b => isMUFG(b.name)); }
    function getSMBCAccount() { return S.banks.find(b => isSMBC(b.name)); }
    function getSBIAccount() { return S.banks.find(b => isSBI(b.name)); }

    function defenseLine() { return S.settings.defenseLine || 150000; }

    function bankPendingOut(bankId) {
        const today = jstToday();
        return S.transactions
            .filter(t => t.status === 'pending' && t.bankId === bankId && t.date >= today && t.type !== 'income' && t.type !== 'savings' && !t.excludeFromCalc)
            .reduce((s, t) => s + (t.amount || 0), 0);
    }

    function calcMUFGFree() {
        const mufg = getMUFGAccount();
        if (!mufg) return 0;
        const balance = mufg.currentBalance || 0;
        const pendingOut = bankPendingOut(mufg.id);
        return balance - pendingOut - defenseLine();
    }

    function nextPaymentDate() {
        const today = jstToday();
        const upcoming = [...new Set(S.transactions
            .filter(t => t.status === 'pending' && t.type === 'credit_card' && t.date >= today)
            .map(t => t.date))].sort();
        return upcoming.length ? upcoming[0] : null;
    }

    // ---------- モード判定 ----------
    function judgeMode(totalIncome) {
        if (totalIncome >= 50000) return 'A';
        if (totalIncome >= 30001) return 'B';
        return 'C';
    }

    // ---------- 描画全体 ----------
    function renderAll() {
        if (activeTab === 'dashboard') renderDashboard();
        else if (activeTab === 'tx') renderTransactions();
        else if (activeTab === 'acc') renderAccounts();
        else if (activeTab === 'rec') renderRecords();
        else if (activeTab === 'cfg') renderSettings();
        updateMissionButton();
    }

    // ========== ダッシュボード ==========
    function renderDashboard() {
        const mufg = getMUFGAccount();
        const smbc = getSMBCAccount();
        const sbi = getSBIAccount();
        const free = calcMUFGFree();
        const defenseBarPercent = mufg ? Math.min(100, Math.max(0, ((mufg.currentBalance || 0) / defenseLine()) * 100)) : 0;
        const npd = nextPaymentDate();

        let html = `
        <div class="glass-card p-5 space-y-3">
            <div class="flex justify-between items-center">
                <h2 class="text-lg font-bold text-white">🏦 ${mufg?.name || '三菱UFJ'} <span class="text-xs font-normal text-slate-400">(生活防衛)</span></h2>
                <span class="text-sm font-mono text-white">${fmt(mufg?.currentBalance || 0)}</span>
            </div>
            <div class="space-y-1">
                <div class="flex justify-between text-xs text-slate-400"><span>防衛ライン達成率</span><span>${defenseBarPercent.toFixed(0)}%</span></div>
                <div class="gauge-bg"><div class="gauge-fill" style="width:${defenseBarPercent}%"></div></div>
            </div>
            <div class="flex justify-between items-center pt-2">
                <span class="text-sm font-semibold text-slate-300">余力</span>
                <span class="text-lg font-black ${free >= 0 ? 'text-neon-green' : 'text-neon-red'}">${fmt(free)}</span>
            </div>
            ${free < 0 ? `<div class="text-xs text-red-400 font-bold mt-1">⚠ 防衛ライン割れ！支出を見直してください</div>` : ''}
            ${npd ? `<div class="text-xs text-slate-500">次回クレカ引落: ${npd}</div>` : ''}
        </div>`;

        if (smbc) {
            html += `
            <div class="glass-card p-5">
                <div class="flex justify-between items-center">
                    <h2 class="text-lg font-bold text-white">🎯 ${smbc.name} <span class="text-xs font-normal text-slate-400">(娯楽/NISA)</span></h2>
                    <span class="text-sm font-mono text-white">${fmt(smbc.currentBalance || 0)}</span>
                </div>
                <div class="mt-2 text-xs text-slate-400">当月NISA: ${fmt(S.settings.nisaGoal)}</div>
            </div>`;
        }

        if (sbi) {
            html += `
            <div class="glass-card p-5">
                <div class="flex justify-between items-center">
                    <h2 class="text-lg font-bold text-white">🔒 ${sbi.name} <span class="text-xs font-normal text-slate-400">(貯金)</span></h2>
                    <span class="text-sm font-mono text-white">${fmt(sbi.currentBalance || 0)}</span>
                </div>
            </div>`;
        }

        document.getElementById('pg-dashboard').innerHTML = html;
    }

    // ========== 取引一覧 ==========
    function renderTransactions() {
        const pending = S.transactions.filter(t => t.status === 'pending');
        const completed = S.transactions.filter(t => t.status === 'completed');
        const collected = S.transactions.filter(t => t.status === 'collected');
        const list = txTab === 'pending' ? pending : txTab === 'completed' ? completed : collected;

        const typeLabels = { credit_card: 'クレカ', withdrawal: '出金', income: '収入', transfer: '振替', investment: '投資', savings: '貯金' };
        const typeColors = { credit_card: 'text-purple-400', withdrawal: 'text-red-400', income: 'text-green-400', transfer: 'text-blue-400', investment: 'text-yellow-400', savings: 'text-teal-400' };

        const txRows = list.map(t => {
            const isIncome = t.type === 'income' || t.type === 'savings';
            return `
            <div class="border-b border-white/5 py-3 px-2 flex justify-between items-start">
                <div class="flex-1">
                    <div class="flex items-center gap-2 flex-wrap">
                        <span class="text-xs font-bold ${typeColors[t.type] || 'text-slate-400'}">${typeLabels[t.type] || t.type}</span>

    // ========== 月別記録 ==========
    function renderRecords() {
        const monthMap = {};
        S.transactions.forEach(t => {
            if (t.type === 'income') return;
            const ym = t.date?.slice(0, 7);
            if (!ym) return;
            if (!monthMap[ym]) monthMap[ym] = { burden: 0, real: 0, lending: 0, savings: 0, collectedLending: 0 };
            const a = t.amount || 0;
            if (t.type === 'savings') { monthMap[ym].savings += a; return; }
            monthMap[ym].burden += a;
            if (t.isLending) { monthMap[ym].lending += a; if (t.status === 'collected') monthMap[ym].collectedLending += a; }
            else { monthMap[ym].real += a; }
        });
        Object.values(monthMap).forEach(d => { d.real = Math.max(0, d.real - d.collectedLending); });

        const months = Object.keys(monthMap).sort().reverse().slice(0, 6).reverse();
        const maxVal = Math.max(...months.map(m => monthMap[m].burden), 1);

        const bars = months.map(ym => {
            const d = monthMap[ym];
            const hA = Math.max(2, (d.burden / maxVal) * 100);
            const hB = Math.max(2, (d.real / maxVal) * 100);
            return `<div class="flex flex-col items-center flex-1">
                <div class="flex items-end gap-0.5 w-full justify-center" style="height:80px">
                    <div style="height:${hA}px; width:12px; background:#f87171; border-radius:3px 3px 0 0" title="負担: ${fmt(d.burden)}"></div>
                    <div style="height:${hB}px; width:12px; background:#2dd4bf; border-radius:3px 3px 0 0" title="実質: ${fmt(d.real)}"></div>
                </div>
                <div class="text-xs text-slate-500 mt-1">${ym.slice(5)}月</div>
            </div>`;
        }).join('');

        document.getElementById('pg-rec').innerHTML = `
        <div class="glass-card p-4 space-y-4">
            <h2 class="font-bold text-white">📊 月別支出（直近6ヶ月）</h2>
            <div class="flex gap-1 items-end">${bars}</div>
            <div class="flex gap-4 text-xs text-slate-400 justify-center">

            </div>
        </div>`;
    }

    };
    window.exportData = async () => {
        const result = { banks: S.banks, transactions: S.transactions, presets: S.presets, settings: S.settings };
        const blob = new Blob([JSON.stringify(result, null, 2)], { type: 'application/json' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = `moneyflow-${jstToday()}.json`;
        a.click();
    };
    window.clearData = async () => {
        if (!confirm('全データを削除しますか？')) return;
        const batch = writeBatch(db);
        S.banks.forEach(b => batch.delete(doc(db, `users/${uid}/banks`, b.id)));
        S.transactions.forEach(t => batch.delete(doc(db, `users/${uid}/transactions`, t.id)));
        S.presets.forEach(p => batch.delete(doc(db, `users/${uid}/presetFixedCosts`, p.id)));
        batch.set(doc(db, `users/${uid}/settings`, 'main'), { defenseLine: 150000 });
        await batch.commit();
    };

    // ========== タブ・モーダル制御 ==========
    window.setTab = (tab) => {
        activeTab = tab;
        ['dashboard','tx','acc','rec','cfg'].forEach(t => document.getElementById(`pg-${t}`).classList.toggle('hidden', t !== tab));
        document.querySelectorAll('.nav-btn').forEach(b => {
            b.classList.toggle('text-white', b.dataset.tab === tab);
            b.classList.toggle('text-slate-500', b.dataset.tab !== tab);
        });
        renderAll();
    };
    window.setTxTab = (tab) => { txTab = tab; renderTransactions(); };
    window.closeM = (id) => document.getElementById(id).classList.add('hidden');
    window.openM = (id) => document.getElementById(id).classList.remove('hidden');
    window.toast = (msg, type = 'ok') => {
        const el = document.getElementById('toast');
        el.textContent = msg;
        el.className = `toast opacity-100 ${type === 'err' ? 'bg-red-500' : 'bg-emerald-500'} text-white`;
        setTimeout(() => el.classList.add('opacity-0'), 2500);
    };

    // ========== 認証 ==========
    window.doLogin = async () => {
        try { await signInWithEmailAndPassword(auth, document.getElementById('a-email').value, document.getElementById('a-pass').value); }
        catch (e) { authErr(e.code); }
    };
    window.doRegister = async () => {
        try { await createUserWithEmailAndPassword(auth, document.getElementById('a-email').value, document.getElementById('a-pass').value); }
        catch (e) { authErr(e.code); }
    };
    function authErr(code) {
        const m = {
            'auth/invalid-email': 'メールアドレスが不正です',
            'auth/wrong-password': 'パスワードが違います',
            'auth/user-not-found': 'ユーザーが見つかりません',
            'auth/email-already-in-use': '登録済みです',
            'auth/weak-password': '6文字以上必要です'
        };
        document.getElementById('a-err').textContent = m[code] || code;
    }
    window.signOutUser = async () => { await signOut(auth); };
    onAuthStateChanged(auth, user => {
        uid = user ? user.uid : null;
        document.getElementById('auth-screen').classList.toggle('hidden', !!user);
        document.getElementById('app-screen').classList.toggle('hidden', !user);
        if (user) {
            loadAll(user.uid);
        } else {
            S = { banks: [], transactions: [], settings: { defenseLine: 150000 }, presets: [] };
        }
    });

    function updateMissionButton() {
        const btn = document.getElementById('mission-trigger-btn');
        if (!btn) return;
        const today = jstToday();
        const day = parseInt(today.slice(8));
        const thisMonth = today.slice(0, 7);
        if ((day === 15 || day === 16) && S.settings.lastMissionMonth !== thisMonth) {
            btn.classList.remove('hidden');
        } else {
            btn.classList.add('hidden');
        }
    }

    // JST時計
    function updateClock() {
        const now = jstNow();
        document.getElementById('jst-clock').textContent = `${now.getFullYear()}/${pad(now.getMonth()+1)}/${pad(now.getDate())} ${pad(now.getHours())}:${pad(now.getMinutes())}:${pad(now.getSeconds())} JST`;
    }
    setInterval(updateClock, 1000);
    updateClock();

    // 初期表示
    setTab('dashboard');
</script>
</body>
</html>
