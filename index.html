<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0f0f14" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="MoneyFlow" />
  <title>MoneyFlow</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Firebase SDK -->
  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
    import {
      getAuth, onAuthStateChanged, signInWithEmailAndPassword,
      createUserWithEmailAndPassword, signOut
    } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';
    import {
      getFirestore, enableIndexedDbPersistence,
      collection, doc, getDocs, addDoc, updateDoc, deleteDoc,
      query, orderBy, limit, setDoc, getDoc, onSnapshot, writeBatch
    } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

    // =============================================
    // 🔧 Firebase設定をここに入力してください
    // =============================================
   const firebaseConfig = {
  apiKey: "AIzaSyA4qpbwxpp8tEEWLCkNMPIYuDTN7G9cF3A",
  authDomain: "cash-manege.firebaseapp.com",
  projectId: "cash-manege",
  storageBucket: "cash-manege.firebasestorage.app",
  messagingSenderId: "529145553530",
  appId: "1:529145553530:web:d65452017ffb9c109b51c3"
};
    // =============================================

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    // オフライン永続化
    enableIndexedDbPersistence(db).catch(err => {
      if (err.code === 'failed-precondition') console.warn('複数タブ使用中のためオフライン永続化無効');
      else if (err.code === 'unimplemented') console.warn('このブラウザはオフライン永続化未対応');
    });

    // =========== ユーティリティ ===========
    function jstNow() {
      const now = new Date();
      const jst = new Date(now.getTime() + 9 * 60 * 60 * 1000);
      return jst;
    }
    function todayJST() {
      return jstNow().toISOString().slice(0, 10);
    }
    function fmtCurrency(n) {
      return new Intl.NumberFormat('ja-JP', { style: 'currency', currency: 'JPY' }).format(n);
    }
    function userPath(uid) {
      return `users/${uid}`;
    }
    function colRef(uid, col) {
      return collection(db, userPath(uid), col);
    }
    function docRef(uid, col, id) {
      return doc(db, userPath(uid), col, id);
    }

    // =========== グローバル状態 ===========
    let currentUser = null;
    let state = {
      banks: [],
      cardTypes: [],
      brokerages: [],
      transactions: [],
      settings: { savingsGoal: 0 },
      presets: []
    };
    let activeTab = 'dashboard';
    let txTab = 'pending';
    let unsubscribers = [];

    // =========== データ読み込み ===========
    async function loadAll(uid) {
      // リアルタイムリスナー
      unsubscribers.forEach(u => u());
      unsubscribers = [];

      const listen = (col, key, sort) => {
        const q = sort ? query(colRef(uid, col), orderBy(sort)) : colRef(uid, col);
        const unsub = onSnapshot(q, snap => {
          state[key] = snap.docs.map(d => ({ id: d.id, ...d.data() }));
          renderAll();
        });
        unsubscribers.push(unsub);
      };

      listen('banks', 'banks', 'name');
      listen('cardTypes', 'cardTypes', 'name');
      listen('brokerages', 'brokerages', 'name');
      listen('presetFixedCosts', 'presets', 'name');

      // transactions: 最新50件表示 (Firestoreには全保存)
      const txQ = query(colRef(uid, 'transactions'), orderBy('date', 'desc'), limit(50));
      const txUnsub = onSnapshot(txQ, snap => {
        state.transactions = snap.docs.map(d => ({ id: d.id, ...d.data() }));
        renderAll();
      });
      unsubscribers.push(txUnsub);

      // settings
      const settingsDoc = await getDoc(doc(db, userPath(uid), 'settings', 'main'));
      if (settingsDoc.exists()) state.settings = settingsDoc.data();
      renderAll();
    }

    // =========== 計算ロジック ===========
    function calcFreeMoney() {
      const totalBalance = state.banks.reduce((s, b) => s + (Number(b.currentBalance) || 0), 0);
      const today = todayJST();
      const pendingFuture = state.transactions
        .filter(t => t.status === 'pending' && t.date >= today)
        .reduce((s, t) => {
          const amt = Number(t.amount) || 0;
          if (['credit_card', 'withdrawal', 'investment'].includes(t.type)) return s + amt;
          if (t.type === 'income') return s - amt;
          return s;
        }, 0);
      const goal = Number(state.settings.savingsGoal) || 0;
      return totalBalance - pendingFuture - goal;
    }

    // =========== 描画 ===========
    function renderAll() {
      renderDashboard();
      renderTransactions();
      renderAccounts();
      renderSettings();
    }

    function renderDashboard() {
      if (activeTab !== 'dashboard') return;
      const free = calcFreeMoney();
      const totalBalance = state.banks.reduce((s, b) => s + (Number(b.currentBalance) || 0), 0);
      const goal = Number(state.settings.savingsGoal) || 0;
      const today = todayJST();
      const pendingCount = state.transactions.filter(t => t.status === 'pending').length;
      const totalInv = state.brokerages.reduce((s, b) => s + (Number(b.currentValuation) || 0), 0);

      const isNegative = free < 0;
      const freeColor = isNegative ? 'text-red-400' : 'text-emerald-300';
      const freeBg = isNegative ? 'bg-red-950/40 border-red-800/50' : 'bg-emerald-950/40 border-emerald-800/50';

      document.getElementById('dashboard-content').innerHTML = `
        <!-- 真の余力 -->
        <div class="card ${freeBg} border mb-4 p-5 rounded-2xl">
          <div class="text-xs text-gray-400 mb-1 tracking-widest uppercase">今月の自由枠（真の余力）</div>
          <div class="${freeColor} text-4xl font-black tracking-tight mb-1">${fmtCurrency(free)}</div>
          ${isNegative ? `<div class="text-red-400 text-xs flex items-center gap-1 mt-1">⚠ 資金ショートの危険があります。支出を見直してください。</div>` : ''}
          <div class="text-gray-500 text-xs mt-2">= 全残高 − 未決済支出 − 貯金/NISA目標</div>
          <div class="mt-3 grid grid-cols-3 gap-2 text-center">
            <div class="bg-white/5 rounded-xl p-2">
              <div class="text-gray-400 text-xs">全口座残高</div>
              <div class="text-white text-sm font-bold">${fmtCurrency(totalBalance)}</div>
            </div>
            <div class="bg-white/5 rounded-xl p-2">
              <div class="text-gray-400 text-xs">貯金/NISA目標</div>
              <div class="text-amber-300 text-sm font-bold">${fmtCurrency(goal)}</div>
            </div>
            <div class="bg-white/5 rounded-xl p-2">
              <div class="text-gray-400 text-xs">未決済件数</div>
              <div class="text-blue-300 text-sm font-bold">${pendingCount}件</div>
            </div>
          </div>
        </div>

        <!-- 口座残高サマリー -->
        <div class="card mb-4">
          <div class="card-header">🏦 口座残高</div>
          ${state.banks.length === 0 ? `<div class="empty-state">口座が登録されていません</div>` :
            state.banks.map(b => `
              <div class="list-item">
                <span class="text-gray-300">${b.name}</span>
                <span class="text-white font-semibold">${fmtCurrency(Number(b.currentBalance) || 0)}</span>
              </div>`).join('')}
        </div>

        <!-- 証券口座 -->
        <div class="card mb-4">
          <div class="card-header">📈 証券口座</div>
          ${state.brokerages.length === 0 ? `<div class="empty-state">証券口座が登録されていません</div>` :
            state.brokerages.map(b => {
              const gain = (Number(b.currentValuation) || 0) - (Number(b.totalInvestment) || 0);
              const gainColor = gain >= 0 ? 'text-emerald-400' : 'text-red-400';
              return `
              <div class="list-item flex-col items-start gap-1">
                <div class="flex w-full justify-between">
                  <span class="text-gray-300">${b.name}</span>
                  <span class="text-white font-semibold">${fmtCurrency(Number(b.currentValuation) || 0)}</span>
                </div>
                <div class="flex w-full justify-between text-xs">
                  <span class="text-gray-500">投資元本: ${fmtCurrency(Number(b.totalInvestment) || 0)}</span>
                  <span class="${gainColor}">${gain >= 0 ? '+' : ''}${fmtCurrency(gain)}</span>
                </div>
              </div>`;
            }).join('')}
        </div>

        <!-- 直近の未決済取引 -->
        <div class="card mb-4">
          <div class="card-header">⏳ 直近の未決済取引</div>
          ${state.transactions.filter(t => t.status === 'pending').slice(0, 5).length === 0
            ? `<div class="empty-state">未決済取引なし</div>`
            : state.transactions.filter(t => t.status === 'pending').slice(0, 5).map(t => renderTxRow(t, true)).join('')}
        </div>
      `;
    }

    function txTypeLabel(type) {
      const map = { credit_card: 'クレカ', withdrawal: '出金', income: '収入', transfer: '振替', investment: '投資' };
      return map[type] || type;
    }
    function txTypeColor(type) {
      const map = { credit_card: 'bg-purple-900/60 text-purple-300', withdrawal: 'bg-red-900/60 text-red-300', income: 'bg-emerald-900/60 text-emerald-300', transfer: 'bg-blue-900/60 text-blue-300', investment: 'bg-amber-900/60 text-amber-300' };
      return map[type] || 'bg-gray-700 text-gray-300';
    }
    function txAmountColor(type) {
      return ['income'].includes(type) ? 'text-emerald-400' : 'text-red-400';
    }
    function txAmountSign(type) {
      return type === 'income' ? '+' : '-';
    }

    function renderTxRow(t, compact = false) {
      const today = todayJST();
      const isPast = t.date < today;
      const canComplete = t.status === 'pending' && isPast;
      return `
        <div class="list-item flex-col items-start gap-1" data-id="${t.id}">
          <div class="flex w-full justify-between items-center">
            <div class="flex items-center gap-2">
              <span class="text-xs px-2 py-0.5 rounded-full ${txTypeColor(t.type)}">${txTypeLabel(t.type)}</span>
              <span class="text-gray-400 text-xs">${t.date}</span>
            </div>
            <span class="${txAmountColor(t.type)} font-bold">${txAmountSign(t.type)}${fmtCurrency(Number(t.amount) || 0)}</span>
          </div>
          ${t.memo ? `<div class="text-gray-500 text-xs pl-1">${t.memo}</div>` : ''}
          ${!compact ? `
          <div class="flex gap-2 mt-1 w-full justify-end">
            ${canComplete ? `<button onclick="completeTx('${t.id}')" class="btn-sm btn-green">✓ 完了</button>` : ''}
            <button onclick="openEditTx('${t.id}')" class="btn-sm btn-gray">編集</button>
            <button onclick="deleteTx('${t.id}')" class="btn-sm btn-red">削除</button>
          </div>` : ''}
        </div>`;
    }

    function renderTransactions() {
      if (activeTab !== 'transactions') return;
      const pending = state.transactions.filter(t => t.status === 'pending');
      const completed = state.transactions.filter(t => t.status === 'completed');
      const list = txTab === 'pending' ? pending : completed;
      const today = todayJST();

      document.getElementById('tx-content').innerHTML = `
        <div class="flex gap-2 mb-4">
          <button onclick="setTxTab('pending')" class="tab-btn ${txTab === 'pending' ? 'tab-active' : 'tab-inactive'}">
            未完了 <span class="ml-1 text-xs bg-white/10 rounded-full px-2">${pending.length}</span>
          </button>
          <button onclick="setTxTab('completed')" class="tab-btn ${txTab === 'completed' ? 'tab-active' : 'tab-inactive'}">
            完了済 <span class="ml-1 text-xs bg-white/10 rounded-full px-2">${completed.length}</span>
          </button>
        </div>
        <div class="card">
          ${list.length === 0 ? `<div class="empty-state">取引なし</div>` :
            list.map(t => renderTxRow(t, false)).join('')}
        </div>
      `;
    }

    function renderAccounts() {
      if (activeTab !== 'accounts') return;
      document.getElementById('accounts-content').innerHTML = `
        <!-- 銀行口座 -->
        <div class="card mb-4">
          <div class="card-header flex justify-between items-center">
            <span>🏦 銀行口座</span>
            <button onclick="openModal('bank-modal')" class="btn-add">+ 追加</button>
          </div>
          ${state.banks.map(b => `
            <div class="list-item">
              <span class="text-gray-300">${b.name}</span>
              <div class="flex items-center gap-3">
                <span class="text-white font-semibold">${fmtCurrency(Number(b.currentBalance) || 0)}</span>
                <button onclick="openEditBank('${b.id}')" class="btn-sm btn-gray">編集</button>
                <button onclick="deleteBank('${b.id}')" class="btn-sm btn-red">削除</button>
              </div>
            </div>`).join('') || `<div class="empty-state">未登録</div>`}
        </div>

        <!-- カード種別 -->
        <div class="card mb-4">
          <div class="card-header flex justify-between items-center">
            <span>💳 カード種別</span>
            <button onclick="openModal('card-modal')" class="btn-add">+ 追加</button>
          </div>
          ${state.cardTypes.map(c => `
            <div class="list-item">
              <span class="text-gray-300">${c.name}</span>
              <button onclick="deleteCard('${c.id}')" class="btn-sm btn-red">削除</button>
            </div>`).join('') || `<div class="empty-state">未登録</div>`}
        </div>

        <!-- 証券口座 -->
        <div class="card mb-4">
          <div class="card-header flex justify-between items-center">
            <span>📈 証券口座</span>
            <button onclick="openModal('brokerage-modal')" class="btn-add">+ 追加</button>
          </div>
          ${state.brokerages.map(b => `
            <div class="list-item flex-col items-start gap-1">
              <div class="flex w-full justify-between items-center">
                <span class="text-gray-300">${b.name}</span>
                <div class="flex gap-2">
                  <button onclick="openEditBrokerage('${b.id}')" class="btn-sm btn-gray">編集</button>
                  <button onclick="deleteBrokerage('${b.id}')" class="btn-sm btn-red">削除</button>
                </div>
              </div>
              <div class="flex gap-4 text-xs text-gray-500 pl-1">
                <span>元本: ${fmtCurrency(Number(b.totalInvestment)||0)}</span>
                <span>評価額: ${fmtCurrency(Number(b.currentValuation)||0)}</span>
              </div>
            </div>`).join('') || `<div class="empty-state">未登録</div>`}
        </div>
      `;
    }

    function renderSettings() {
      if (activeTab !== 'settings') return;
      document.getElementById('settings-content').innerHTML = `
        <!-- 貯金・NISA目標 -->
        <div class="card mb-4">
          <div class="card-header">🎯 今月の貯金・NISA目標合計額</div>
          <div class="p-4 flex gap-3">
            <input id="goal-input" type="number" value="${state.settings.savingsGoal || 0}"
              class="input-field flex-1" placeholder="目標額（円）" />
            <button onclick="saveGoal()" class="btn-primary">保存</button>
          </div>
        </div>

        <!-- 固定費プリセット -->
        <div class="card mb-4">
          <div class="card-header flex justify-between items-center">
            <span>📋 固定費プリセット</span>
            <button onclick="openModal('preset-modal')" class="btn-add">+ 追加</button>
          </div>
          ${state.presets.map(p => `
            <div class="list-item">
              <div>
                <div class="text-gray-300">${p.name}</div>
                <div class="text-gray-500 text-xs">${txTypeLabel(p.type)}</div>
              </div>
              <div class="flex items-center gap-2">
                <span class="text-white font-semibold">${fmtCurrency(Number(p.amount)||0)}</span>
                <button onclick="deletePreset('${p.id}')" class="btn-sm btn-red">削除</button>
              </div>
            </div>`).join('') || `<div class="empty-state">固定費プリセット未登録</div>`}
          ${state.presets.length > 0 ? `
          <div class="p-4 pt-2">
            <button onclick="applyPresets()" class="w-full btn-primary">
              📥 今月の未決済支出として一括追加
            </button>
          </div>` : ''}
        </div>

        <!-- エクスポート -->
        <div class="card mb-4">
          <div class="card-header">💾 データエクスポート</div>
          <div class="p-4">
            <button onclick="exportData()" class="w-full btn-secondary">JSONでダウンロード</button>
          </div>
        </div>

        <!-- ログアウト -->
        <div class="card mb-4">
          <div class="p-4">
            <button onclick="doSignOut()" class="w-full btn-danger">ログアウト</button>
          </div>
        </div>
      `;
    }

    // =========== アクション ===========
    window.setTab = function(tab) {
      activeTab = tab;
      document.querySelectorAll('.nav-btn').forEach(b => {
        b.classList.toggle('nav-active', b.dataset.tab === tab);
        b.classList.toggle('nav-inactive', b.dataset.tab !== tab);
      });
      ['dashboard','transactions','accounts','settings'].forEach(t => {
        const el = document.getElementById(`${t}-page`);
        if (el) el.classList.toggle('hidden', t !== tab);
      });
      renderAll();
    };

    window.setTxTab = function(tab) {
      txTab = tab;
      renderTransactions();
    };

    window.openModal = function(id) {
      document.getElementById(id).classList.remove('hidden');
    };
    window.closeModal = function(id) {
      document.getElementById(id).classList.add('hidden');
    };

    // 取引追加
    window.addTransaction = async function() {
      if (!currentUser) return;
      const date = document.getElementById('tx-date').value;
      const type = document.getElementById('tx-type').value;
      const amount = document.getElementById('tx-amount').value;
      const memo = document.getElementById('tx-memo').value;
      if (!date || !amount) return showToast('日付と金額を入力してください', 'error');
      await addDoc(colRef(currentUser.uid, 'transactions'), {
        date, type, amount: Number(amount), memo, status: 'pending',
        createdAt: new Date().toISOString()
      });
      closeModal('tx-modal');
      document.getElementById('tx-amount').value = '';
      document.getElementById('tx-memo').value = '';
      showToast('取引を追加しました');
    };

    // 取引編集
    window.openEditTx = function(id) {
      const t = state.transactions.find(x => x.id === id);
      if (!t) return;
      document.getElementById('edit-tx-id').value = id;
      document.getElementById('edit-tx-date').value = t.date;
      document.getElementById('edit-tx-type').value = t.type;
      document.getElementById('edit-tx-amount').value = t.amount;
      document.getElementById('edit-tx-memo').value = t.memo || '';
      document.getElementById('edit-tx-status').value = t.status;
      openModal('edit-tx-modal');
    };

    window.saveEditTx = async function() {
      if (!currentUser) return;
      const id = document.getElementById('edit-tx-id').value;
      await updateDoc(docRef(currentUser.uid, 'transactions', id), {
        date: document.getElementById('edit-tx-date').value,
        type: document.getElementById('edit-tx-type').value,
        amount: Number(document.getElementById('edit-tx-amount').value),
        memo: document.getElementById('edit-tx-memo').value,
        status: document.getElementById('edit-tx-status').value,
      });
      closeModal('edit-tx-modal');
      showToast('取引を更新しました');
    };

    window.deleteTx = async function(id) {
      if (!confirm('削除しますか？')) return;
      await deleteDoc(docRef(currentUser.uid, 'transactions', id));
      showToast('削除しました');
    };

    // 取引完了処理
    window.completeTx = async function(id) {
      if (!currentUser) return;
      const t = state.transactions.find(x => x.id === id);
      if (!t) return;
      const batch = writeBatch(db);

      // 残高更新
      if (['credit_card', 'withdrawal'].includes(t.type)) {
        const bank = state.banks[0]; // TODO: 口座選択対応
        if (bank) {
          const newBal = (Number(bank.currentBalance) || 0) - Number(t.amount);
          batch.update(docRef(currentUser.uid, 'banks', bank.id), { currentBalance: newBal });
        }
      } else if (t.type === 'income') {
        const bank = state.banks[0];
        if (bank) {
          const newBal = (Number(bank.currentBalance) || 0) + Number(t.amount);
          batch.update(docRef(currentUser.uid, 'banks', bank.id), { currentBalance: newBal });
        }
      } else if (t.type === 'investment') {
        const brokerage = state.brokerages[0];
        if (brokerage) {
          const newInv = (Number(brokerage.totalInvestment) || 0) + Number(t.amount);
          batch.update(docRef(currentUser.uid, 'brokerages', brokerage.id), { totalInvestment: newInv });
        }
      }
      batch.update(docRef(currentUser.uid, 'transactions', id), { status: 'completed' });
      await batch.commit();
      showToast('取引を完了しました');
    };

    // 銀行口座
    window.addBank = async function() {
      const name = document.getElementById('bank-name').value.trim();
      const bal = document.getElementById('bank-balance').value;
      if (!name) return;
      await addDoc(colRef(currentUser.uid, 'banks'), { name, currentBalance: Number(bal) || 0 });
      closeModal('bank-modal');
      document.getElementById('bank-name').value = '';
      document.getElementById('bank-balance').value = '';
      showToast('口座を追加しました');
    };

    window.openEditBank = function(id) {
      const b = state.banks.find(x => x.id === id);
      if (!b) return;
      document.getElementById('edit-bank-id').value = id;
      document.getElementById('edit-bank-name').value = b.name;
      document.getElementById('edit-bank-balance').value = b.currentBalance;
      openModal('edit-bank-modal');
    };

    window.saveEditBank = async function() {
      const id = document.getElementById('edit-bank-id').value;
      await updateDoc(docRef(currentUser.uid, 'banks', id), {
        name: document.getElementById('edit-bank-name').value,
        currentBalance: Number(document.getElementById('edit-bank-balance').value)
      });
      closeModal('edit-bank-modal');
      showToast('口座を更新しました');
    };

    window.deleteBank = async function(id) {
      if (!confirm('削除しますか？')) return;
      await deleteDoc(docRef(currentUser.uid, 'banks', id));
      showToast('削除しました');
    };

    // カード
    window.addCard = async function() {
      const name = document.getElementById('card-name').value.trim();
      if (!name) return;
      await addDoc(colRef(currentUser.uid, 'cardTypes'), { name });
      closeModal('card-modal');
      document.getElementById('card-name').value = '';
      showToast('カードを追加しました');
    };

    window.deleteCard = async function(id) {
      if (!confirm('削除しますか？')) return;
      await deleteDoc(docRef(currentUser.uid, 'cardTypes', id));
    };

    // 証券口座
    window.addBrokerage = async function() {
      const name = document.getElementById('brokerage-name').value.trim();
      const inv = document.getElementById('brokerage-inv').value;
      const val = document.getElementById('brokerage-val').value;
      if (!name) return;
      await addDoc(colRef(currentUser.uid, 'brokerages'), {
        name, totalInvestment: Number(inv)||0, currentValuation: Number(val)||0
      });
      closeModal('brokerage-modal');
      document.getElementById('brokerage-name').value = '';
      document.getElementById('brokerage-inv').value = '';
      document.getElementById('brokerage-val').value = '';
      showToast('証券口座を追加しました');
    };

    window.openEditBrokerage = function(id) {
      const b = state.brokerages.find(x => x.id === id);
      if (!b) return;
      document.getElementById('edit-brokerage-id').value = id;
      document.getElementById('edit-brokerage-name').value = b.name;
      document.getElementById('edit-brokerage-inv').value = b.totalInvestment;
      document.getElementById('edit-brokerage-val').value = b.currentValuation;
      openModal('edit-brokerage-modal');
    };

    window.saveEditBrokerage = async function() {
      const id = document.getElementById('edit-brokerage-id').value;
      await updateDoc(docRef(currentUser.uid, 'brokerages', id), {
        name: document.getElementById('edit-brokerage-name').value,
        totalInvestment: Number(document.getElementById('edit-brokerage-inv').value),
        currentValuation: Number(document.getElementById('edit-brokerage-val').value),
      });
      closeModal('edit-brokerage-modal');
      showToast('証券口座を更新しました');
    };

    window.deleteBrokerage = async function(id) {
      if (!confirm('削除しますか？')) return;
      await deleteDoc(docRef(currentUser.uid, 'brokerages', id));
    };

    // 設定
    window.saveGoal = async function() {
      const val = Number(document.getElementById('goal-input').value) || 0;
      await setDoc(doc(db, userPath(currentUser.uid), 'settings', 'main'), { savingsGoal: val });
      state.settings.savingsGoal = val;
      showToast('目標額を保存しました');
      renderAll();
    };

    // 固定費プリセット
    window.addPreset = async function() {
      const name = document.getElementById('preset-name').value.trim();
      const amount = document.getElementById('preset-amount').value;
      const type = document.getElementById('preset-type').value;
      if (!name || !amount) return;
      await addDoc(colRef(currentUser.uid, 'presetFixedCosts'), { name, amount: Number(amount), type });
      closeModal('preset-modal');
      document.getElementById('preset-name').value = '';
      document.getElementById('preset-amount').value = '';
      showToast('固定費を追加しました');
    };

    window.deletePreset = async function(id) {
      if (!confirm('削除しますか？')) return;
      await deleteDoc(docRef(currentUser.uid, 'presetFixedCosts', id));
    };

    window.applyPresets = async function() {
      if (!currentUser || state.presets.length === 0) return;
      const today = todayJST();
      const batch = writeBatch(db);
      state.presets.forEach(p => {
        const ref = doc(colRef(currentUser.uid, 'transactions'));
        batch.set(ref, {
          date: today, type: p.type, amount: Number(p.amount),
          memo: `[固定費] ${p.name}`, status: 'pending',
          createdAt: new Date().toISOString()
        });
      });
      await batch.commit();
      showToast(`${state.presets.length}件の固定費を一括追加しました`);
    };

    // エクスポート
    window.exportData = async function() {
      if (!currentUser) return;
      const uid = currentUser.uid;
      const result = {};
      for (const col of ['banks', 'cardTypes', 'brokerages', 'presetFixedCosts']) {
        const snap = await getDocs(colRef(uid, col));
        result[col] = snap.docs.map(d => ({ id: d.id, ...d.data() }));
      }
      const txSnap = await getDocs(query(colRef(uid, 'transactions'), orderBy('date', 'desc')));
      result.transactions = txSnap.docs.map(d => ({ id: d.id, ...d.data() }));
      const settingsDoc = await getDoc(doc(db, userPath(uid), 'settings', 'main'));
      result.settings = settingsDoc.exists() ? settingsDoc.data() : {};
      const blob = new Blob([JSON.stringify(result, null, 2)], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `moneyflow-export-${today}.json`;
      a.click();
      URL.revokeObjectURL(url);
      showToast('エクスポートしました');
    };

    // ログアウト
    window.doSignOut = async function() {
      unsubscribers.forEach(u => u());
      await signOut(auth);
    };

    // トースト通知
    function showToast(msg, type = 'success') {
      const toast = document.getElementById('toast');
      toast.textContent = msg;
      toast.className = `fixed bottom-20 left-1/2 -translate-x-1/2 z-50 px-4 py-2 rounded-full text-sm font-medium shadow-lg transition-all duration-300 ${type === 'error' ? 'bg-red-600 text-white' : 'bg-emerald-600 text-white'}`;
      toast.classList.remove('opacity-0');
      setTimeout(() => toast.classList.add('opacity-0'), 2500);
    }

    // =========== 認証 ===========
    window.doLogin = async function() {
      const email = document.getElementById('login-email').value;
      const pass = document.getElementById('login-pass').value;
      try {
        await signInWithEmailAndPassword(auth, email, pass);
      } catch(e) {
        showAuthError(e.code);
      }
    };

    window.doRegister = async function() {
      const email = document.getElementById('login-email').value;
      const pass = document.getElementById('login-pass').value;
      try {
        await createUserWithEmailAndPassword(auth, email, pass);
      } catch(e) {
        showAuthError(e.code);
      }
    };

    function showAuthError(code) {
      const msgs = {
        'auth/invalid-email': 'メールアドレスの形式が正しくありません',
        'auth/wrong-password': 'パスワードが間違っています',
        'auth/user-not-found': 'ユーザーが見つかりません',
        'auth/email-already-in-use': 'このメールアドレスは既に使用されています',
        'auth/weak-password': 'パスワードは6文字以上にしてください',
      };
      document.getElementById('auth-error').textContent = msgs[code] || 'エラーが発生しました: ' + code;
    }

    // 認証状態監視
    onAuthStateChanged(auth, user => {
      currentUser = user;
      if (user) {
        document.getElementById('auth-screen').classList.add('hidden');
        document.getElementById('app-screen').classList.remove('hidden');
        loadAll(user.uid);
      } else {
        document.getElementById('auth-screen').classList.remove('hidden');
        document.getElementById('app-screen').classList.add('hidden');
        state = { banks: [], cardTypes: [], brokerages: [], transactions: [], settings: { savingsGoal: 0 }, presets: [] };
      }
    });

    // Service Worker登録
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js')
          .then(() => console.log('SW registered'))
          .catch(err => console.warn('SW registration failed:', err));
      });
    }
  </script>

      <div class="space-y-3">
        <div><label class="form-label">口座名</label>
          <input id="edit-brokerage-name" type="text" class="input-field" /></div>
        <div><label class="form-label">投資元本（円）</label>
          <input id="edit-brokerage-inv" type="number" class="input-field" /></div>
        <div><label class="form-label">現在評価額（円）</label>
          <input id="edit-brokerage-val" type="number" class="input-field" /></div>
        <div class="flex gap-3 pt-2">
          <button onclick="closeModal('edit-brokerage-modal')" class="btn-secondary flex-1">キャンセル</button>
          <button onclick="saveEditBrokerage()" class="btn-primary flex-1">保存</button>
        </div>
      </div>
    </div>
  </div>

  <!-- 固定費プリセット追加 -->
  <div id="preset-modal" class="modal-bg hidden">
    <div class="modal-box">
      <div class="modal-title">固定費プリセットを追加</div>
      <div class="space-y-3">
        <div><label class="form-label">項目名</label>
          <input id="preset-name" type="text" class="input-field" placeholder="例: 電気代" /></div>
        <div><label class="form-label">概算金額（円）</label>
          <input id="preset-amount" type="number" class="input-field" placeholder="0" /></div>
        <div><label class="form-label">種別</label>
          <select id="preset-type" class="input-field">
            <option value="withdrawal">出金</option>
            <option value="credit_card">クレカ返済</option>
          </select></div>
        <div class="flex gap-3 pt-2">
          <button onclick="closeModal('preset-modal')" class="btn-secondary flex-1">キャンセル</button>
          <button onclick="addPreset()" class="btn-primary flex-1">追加</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    // 取引追加モーダルのデフォルト日付をJST今日にセット
    document.getElementById('tx-date').value = (() => {
      const now = new Date();
      const jst = new Date(now.getTime() + 9 * 60 * 60 * 1000);
      return jst.toISOString().slice(0, 10);
    })();
  </script>
</body>
</html>
